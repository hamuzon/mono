<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>計算 / Calculator</title>

    <script>
        (function() {
            const cfg = JSON.parse(localStorage.getItem('p10_cfg') || '{"theme":"system"}');
            const isDark = cfg.theme === 'dark' || (cfg.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark');
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surface: #EFF1E0;
            --on-surface: #44483D;
            --primary: #4C662B;
            --on-primary: #FFFFFF;
            --primary-cont: #D7E8B7;
            --on-primary-cont: #121F00;
            --sec-cont: #E3E4D3;
            --on-sec-cont: #1B1C17;
            --accent: #B1D18A;
            --radius: 32px;
        }

        .dark {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surface: #2F3126;
            --on-surface: #C7C8B8;
            --primary: #B1D18A;
            --on-primary: #1F3701;
            --primary-cont: #3E4A2B;
            --on-primary-cont: #D7E8B7;
            --sec-cont: #45483C;
            --on-sec-cont: #E3E4D3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            height: 100dvh;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: calc(24px + env(safe-area-inset-top)) 24px 24px;
            display: flex; flex-direction: column;
        }

        .overlay.open { top: 0; }

        .display-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 32px;
        }

        #history-display {
            font-size: 1.5rem;
            color: var(--on-surface);
            opacity: 0.7;
            min-height: 2rem;
            text-align: right;
            margin-bottom: 12px;
        }

        #main-display {
            width: 100%;
            font-size: clamp(2.5rem, 12vw, 5rem);
            text-align: right;
            border: none;
            background: transparent;
            color: var(--on-bg);
        }

        .pad-card {
            background: var(--surface);
            border-radius: 40px 40px 0 0;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 16px 32px 8px;
            color: var(--primary);
        }

        .toolbar span { cursor: pointer; padding: 10px; font-size: 1.8rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 8px 24px 16px;
        }

        button {
            height: 72px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--on-bg);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.92); filter: brightness(0.9); }

        .btn-op { background: var(--primary-cont); color: var(--on-primary-cont); }
        .btn-fn { background: var(--sec-cont); color: var(--on-sec-cont); }
        .btn-eq { background: var(--primary); color: var(--on-primary); font-size: 2.2rem; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--sec-cont);
        }

        .hist-item { text-align: right; margin-bottom: 32px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="settings-panel" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <span style="font-size:1.6rem; font-weight:500;">設定 / Settings</span>
            <span class="material-symbols-outlined" onclick="toggleUI('settings')">close</span>
        </div>
        <div class="item-row">
            <span>テーマ / Theme</span>
            <select id="theme-sel" onchange="saveCfg()" style="padding:8px; border-radius:8px;">
                <option value="system">システム</option>
                <option value="light">ライト</option>
                <option value="dark">ダーク</option>
            </select>
        </div>
        <div class="item-row">
            <span>振動強度 / Vibration</span>
            <input type="range" id="vibe-slide" min="0" max="100" step="10" onchange="saveCfg()">
        </div>
    </div>

    <div id="history-panel" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <span style="font-size:1.6rem; font-weight:500;">履歴 / History</span>
            <div style="display:flex; gap:20px;">
                <span class="material-symbols-outlined" onclick="clearHist()">delete</span>
                <span class="material-symbols-outlined" onclick="toggleUI('history')">close</span>
            </div>
        </div>
        <div id="hist-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div class="display-section">
        <div id="history-display"></div>
        <input type="text" id="main-display" readonly value="0">
    </div>

    <div class="pad-card">
        <div class="toolbar">
            <span class="material-symbols-outlined" onclick="toggleUI('settings')">settings</span>
            <span class="material-symbols-outlined" onclick="toggleUI('history')">history</span>
            <span class="material-symbols-outlined">expand_more</span>
        </div>

        <div class="grid">
            <button class="btn-fn" onclick="push('AC')">AC</button>
            <button class="btn-fn" onclick="push('()')">( )</button>
            <button class="btn-fn" onclick="push('%')">%</button>
            <button class="btn-op" onclick="push('÷')">÷</button>

            <button onclick="push('7')">7</button>
            <button onclick="push('8')">8</button>
            <button onclick="push('9')">9</button>
            <button class="btn-op" onclick="push('×')">×</button>

            <button onclick="push('4')">4</button>
            <button onclick="push('5')">5</button>
            <button onclick="push('6')">6</button>
            <button class="btn-op" onclick="push('−')">−</button>

            <button onclick="push('1')">1</button>
            <button onclick="push('2')">2</button>
            <button onclick="push('3')">3</button>
            <button class="btn-op" onclick="push('+')">+</button>

            <button onclick="push('0')">0</button>
            <button onclick="push('.')">.</button>
            <button class="btn-fn" onclick="push('DEL')"><span class="material-symbols-outlined">backspace</span></button>
            <button class="btn-eq" onclick="push('=')">=</button>
        </div>
    </div>

    <script>
        let expr = localStorage.getItem('p10_expr') || '';
        let hist = JSON.parse(localStorage.getItem('p10_hist') || '[]');
        let cfg = JSON.parse(localStorage.getItem('p10_cfg') || '{"theme":"system","vibe":30}');
        let lastRes = false;

        function vib() { if(cfg.vibe > 0 && navigator.vibrate) navigator.vibrate(cfg.vibe/2); }

        function toggleUI(id) { vib(); document.getElementById(id+'-panel').classList.toggle('open'); if(id==='history') renderHist(); }

        function saveCfg() {
            cfg.theme = document.getElementById('theme-sel').value;
            cfg.vibe = document.getElementById('vibe-slide').value;
            localStorage.setItem('p10_cfg', JSON.stringify(cfg));
            const isDark = cfg.theme === 'dark' || (cfg.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            vib();
        }

        function renderHist() {
            const l = document.getElementById('hist-list');
            l.innerHTML = hist.length ? '' : '<p style="text-align:center;opacity:0.5;">No History</p>';
            hist.forEach((h, i) => {
                const d = document.createElement('div');
                d.className = 'hist-item';
                d.innerHTML = `<div style="opacity:0.6;">${h.q}</div><div style="font-size:1.8rem;font-weight:500;">${h.a}</div>`;
                d.onclick = () => { expr = h.a.replace(/-/g, '−'); update(); toggleUI('history'); };
                l.appendChild(d);
            });
        }

        function clearHist() { vib(); hist = []; localStorage.setItem('p10_hist', '[]'); renderHist(); }

        function update() {
            document.getElementById('main-display').value = expr || '0';
            localStorage.setItem('p10_expr', expr);
        }

        function push(v) {
            vib();
            const main = document.getElementById('main-display');
            const sub = document.getElementById('history-display');

            if (v === 'AC') { expr = ''; sub.innerText = ''; lastRes = false; }
            else if (v === 'DEL') { expr = expr.slice(0, -1); }
            else if (v === '=') {
                if(!expr) return;
                try {
                    let proc = expr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-')
                                   .replace(/(\d)\(/g, '$1*(').replace(/\)(\d)/g, ')*$1').replace(/\)\(/g, ')*(');
                    const diff = (proc.match(/\(/g) || []).length - (proc.match(/\)/g) || []).length;
                    if(diff > 0) proc += ')'.repeat(diff);
                    
                    let res = eval(proc);
                    let final = Number(Math.round(res + 'e12') + 'e-12').toString();
                    
                    hist.unshift({q: expr, a: final});
                    localStorage.setItem('p10_hist', JSON.stringify(hist.slice(0, 20)));
                    sub.innerText = expr + ' =';
                    expr = final.replace(/-/g, '−');
                    lastRes = true;
                } catch { main.value = 'Error'; setTimeout(()=>update(), 800); return; }
            } else if (v === '()') {
                const open = (expr.match(/\(/g) || []).length, close = (expr.match(/\)/g) || []).length;
                if (expr === '' || /[+−×÷(]$/.test(expr)) expr += '(';
                else if (open > close) expr += ')';
                else expr += '×(';
            } else {
                if (lastRes && /[0-9.]/.test(v)) expr = '';
                expr += v;
                lastRes = false;
            }
            update();
        }

        document.getElementById('theme-sel').value = cfg.theme;
        document.getElementById('vibe-slide').value = cfg.vibe;
        update();
    </script>
</body>
</html>
