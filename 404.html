<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found - mono.hamusata.f5.si</title>
  <meta name="description" content="404 Not Found - ページが見つかりません">
  <meta name="author" content="hamusata">
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Potta One', cursive;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    .aurora-background {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(175, 109, 255, 0.85), transparent 68%),
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(255, 100, 180, 0.75), transparent 68%),
        radial-gradient(ellipse 60% 50% at 60% 65%, rgba(255, 235, 170, 0.95), transparent 68%),
        radial-gradient(ellipse 65% 40% at 50% 60%, rgba(120, 190, 255, 0.35), transparent 68%),
        linear-gradient(180deg, #f7eaff 0%, #fde2ea 100%);
      animation: auroraMove 22s ease-in-out infinite alternate;
    }

    @keyframes auroraMove {
      0% { transform: scale(1) translate(0, 0); }
      50% { transform: scale(1.05) translate(-10px, 10px); }
      100% { transform: scale(1) translate(0, 0); }
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 2rem;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 5rem;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0.3rem 0;
    }

    .subtext {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-top: 0.5rem;
    }

    .back {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .back:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    footer a {
      color: #ffd1dc;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      h1 { font-size: 3.6rem; }
      .title { font-size: 1.4rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="aurora-background"></div>

  <div class="content">
    <h1>404</h1>
    <div class="title">Not Found</div>

    <p>お探しのページは見つかりませんでした。</p>
    <p class="subtext">The page you are looking for does not exist.</p>

    <a class="back" href="/">トップページへ戻る</a>

    <footer>
      &copy; 2025 <a href="https://hamusata.f5.si">@hamusata</a>
    </footer>
  </div>

</body>
</html>
