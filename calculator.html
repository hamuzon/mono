<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>計算機 / Calculator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <script>
        (function() {
            const config = JSON.parse(localStorage.getItem('calc_config') || '{"theme":"system","vibe":"on"}');
            const isDark = config.theme === 'dark' || (config.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark-mode');
        })();
    </script>

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surface: #EFF1E0;
            --on-surface: #44483D;
            --primary-cont: #D7E8B7;
            --on-primary-cont: #121F00;
            --sec-cont: #E3E4D3;
            --on-sec-cont: #1B1C17;
            --accent: #4C662B;
        }

        .dark-mode {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surface: #2F3126;
            --on-surface: #C7C8B8;
            --primary-cont: #3E4A2B;
            --on-primary-cont: #D7E8B7;
            --sec-cont: #45483C;
            --on-sec-cont: #E3E4D3;
            --accent: #B1D18A;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px;
            padding-top: env(safe-area-inset-top);
            display: flex;
            flex-direction: column;
        }

        .overlay.open {
            top: 0;
        }

        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 24px 32px;
        }

        #sub {
            font-size: 1.5rem;
            color: var(--on-surface);
            opacity: 0.7;
            min-height: 1.8rem;
            width: 100%;
            text-align: right;
        }

        #main {
            width: 100%;
            font-size: clamp(3rem, 15vw, 5.5rem);
            text-align: right;
            border: none;
            background: transparent;
            color: var(--on-bg);
            font-family: inherit;
        }

        .pad-container {
            background: var(--surface);
            border-radius: 40px 40px 0 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 12px 32px 4px;
            color: var(--accent);
        }

        .toolbar span {
            cursor: pointer;
            padding: 8px;
            font-size: 1.8rem;
        }

        .grid-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .adv-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 0 24px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .adv-grid.show {
            max-height: 200px;
            padding: 12px 24px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 12px 24px 24px;
        }

        button {
            aspect-ratio: 1/1;
            border: none;
            border-radius: 50%;
            font-size: 1.6rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--on-bg);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.9);
        }

        .btn-op {
            background: var(--primary-cont);
            color: var(--on-primary-cont);
            font-size: 2rem;
        }

        .btn-fn {
            background: var(--sec-cont);
            color: var(--on-sec-cont);
        }

        .btn-eq {
            background: var(--accent);
            color: var(--bg);
            border-radius: 40px;
            font-size: 2rem;
        }

        .btn-adv {
            background: transparent;
            font-size: 1.1rem;
            color: var(--on-surface);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--surface);
        }

        select {
            padding: 10px;
            border-radius: 12px;
            background: var(--surface);
            color: var(--on-bg);
            border: none;
            font-family: inherit;
        }

        .hist-row {
            text-align: right;
            margin-bottom: 32px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="panel-settings" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
            <span style="font-size:1.5rem; font-weight:500;">設定</span>
            <span class="material-symbols-outlined" onclick="closeOverlay()">close</span>
        </div>

        <div class="item">
            <span>テーマ</span>
            <select id="sel-theme" onchange="applySettings()">
                <option value="system">システム連動</option>
                <option value="light">ライトモード</option>
                <option value="dark">ダークモード</option>
            </select>
        </div>

        <div class="item">
            <span>操作バイブレーション</span>
            <select id="sel-vibe" onchange="applySettings()">
                <option value="on">ON</option>
                <option value="off">OFF</option>
            </select>
        </div>
    </div>

    <div id="panel-history" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
            <span style="font-size:1.5rem; font-weight:500;">履歴</span>
            <div style="display:flex; gap:24px; align-items:center;">
                <span class="material-symbols-outlined" onclick="clearHist()">delete</span>
                <span class="material-symbols-outlined" onclick="closeOverlay()">close</span>
            </div>
        </div>
        <div id="hist-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div class="display">
        <div id="sub"></div>
        <input type="text" id="main" readonly placeholder="0">
    </div>

    <div class="pad-container">
        <div class="toolbar">
            <span class="material-symbols-outlined" onclick="openOverlay('settings')">settings</span>
            <span class="material-symbols-outlined" onclick="openOverlay('history')">history</span>
            <span class="material-symbols-outlined" id="toggle-icon" onclick="toggleAdv()">keyboard_arrow_down</span>
        </div>

        <div class="grid-wrapper">
            <div id="grid-adv" class="adv-grid">
                <button class="btn-adv" onclick="add('sin(')">sin</button>
                <button class="btn-adv" onclick="add('cos(')">cos</button>
                <button class="btn-adv" onclick="add('tan(')">tan</button>
                <button class="btn-adv" onclick="add('π')">π</button>
                <button class="btn-adv" onclick="add('ln(')">ln</button>
                <button class="btn-adv" onclick="add('log(')">log</button>
                <button class="btn-adv" onclick="add('^')">^</button>
                <button class="btn-adv" onclick="add('√(')">√</button>
            </div>

            <div class="main-grid">
                <button class="btn-fn" onclick="add('AC')">AC</button>
                <button class="btn-fn" onclick="add('()')">( )</button>
                <button class="btn-fn" onclick="add('%')">%</button>
                <button class="btn-op" onclick="add('÷')">÷</button>

                <button class="btn-num" onclick="add('7')">7</button>
                <button class="btn-num" onclick="add('8')">8</button>
                <button class="btn-num" onclick="add('9')">9</button>
                <button class="btn-op" onclick="add('×')">×</button>

                <button class="btn-num" onclick="add('4')">4</button>
                <button class="btn-num" onclick="add('5')">5</button>
                <button class="btn-num" onclick="add('6')">6</button>
                <button class="btn-op" onclick="add('−')">−</button>

                <button class="btn-num" onclick="add('1')">1</button>
                <button class="btn-num" onclick="add('2')">2</button>
                <button class="btn-num" onclick="add('3')">3</button>
                <button class="btn-op" onclick="add('+')">+</button>

                <button class="btn-num" onclick="add('0')">0</button>
                <button class="btn-num" onclick="add('.')">.</button>
                <button class="btn-fn" onclick="add('DEL')"><span class="material-symbols-outlined">backspace</span></button>
                <button class="btn-eq" onclick="add('=')">=</button>
            </div>
        </div>
    </div>

    <script>
        let expr = '';
        let hData = JSON.parse(localStorage.getItem('calc_h') || '[]');
        let config = JSON.parse(localStorage.getItem('calc_config') || '{"theme":"system","vibe":"on"}');

        function vib() { 
            if (config.vibe === 'on' && navigator.vibrate) navigator.vibrate(15); 
        }

        function applySettings() {
            config.theme = document.getElementById('sel-theme').value;
            config.vibe = document.getElementById('sel-vibe').value;
            localStorage.setItem('calc_config', JSON.stringify(config));
            
            const isDark = config.theme === 'dark' || (config.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark-mode', isDark);
            vib();
        }

        function openOverlay(id) { 
            vib(); 
            document.getElementById('panel-' + id).classList.add('open'); 
            if(id === 'history') renderHist(); 
        }

        function closeOverlay() { 
            document.querySelectorAll('.overlay').forEach(el => el.classList.remove('open')); 
        }

        function toggleAdv() {
            vib();
            const g = document.getElementById('grid-adv'), i = document.getElementById('toggle-icon');
            g.classList.toggle('show');
            i.innerText = g.classList.contains('show') ? 'keyboard_arrow_up' : 'keyboard_arrow_down';
        }

        function add(v) {
            vib();
            const mainEl = document.getElementById('main'), subEl = document.getElementById('sub');

            if (v === 'AC') { 
                expr = ''; 
                subEl.innerText = ''; 
            } else if (v === 'DEL') { 
                expr = expr.slice(0, -1); 
            } else if (v === '=') {
                try {
                    let f = expr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/%/g, '/100').replace(/π/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/ln\(/g, 'Math.log(').replace(/log\(/g, 'Math.log10(').replace(/\^/g, '**').replace(/√\(/g, 'Math.sqrt(');
                    let res = eval(f);
                    let out = Number(res.toPrecision(12)).toString();
                    hData.unshift({ q: expr, a: out });
                    localStorage.setItem('calc_h', JSON.stringify(hData.slice(0, 30)));
                    subEl.innerText = expr + ' =';
                    expr = out.replace(/-/g, '−');
                } catch { 
                    mainEl.value = 'Error'; 
                    setTimeout(() => add('AC'), 800); 
                    return; 
                }
            } else if (v === '()') {
                const o = (expr.match(/\(/g) || []).length, c = (expr.match(/\)/g) || []).length;
                expr += (o > c && /[0-9π)]$/.test(expr.slice(-1))) ? ')' : '(';
            } else { 
                expr += v; 
            }
            mainEl.value = expr || '0';
        }

        function renderHist() {
            const list = document.getElementById('hist-list');
            list.innerHTML = hData.length ? '' : '<p style="text-align:center; opacity:0.5; margin-top:50px;">履歴はありません</p>';
            hData.forEach(i => {
                const div = document.createElement('div');
                div.className = 'hist-row';
                div.innerHTML = `<div style="opacity:0.6; font-size:1.1rem;">${i.q}</div><div style="font-size:2rem; font-weight:500;">${i.a}</div>`;
                div.onclick = () => { 
                    expr = i.a.replace(/-/g, '−'); 
                    document.getElementById('main').value = expr; 
                    closeOverlay(); 
                };
                list.appendChild(div);
            });
        }

        function clearHist() { 
            vib(); 
            hData = []; 
            localStorage.removeItem('calc_h'); 
            renderHist(); 
        }

        document.getElementById('sel-theme').value = config.theme;
        document.getElementById('sel-vibe').value = config.vibe;
    </script>

</body>
</html>
