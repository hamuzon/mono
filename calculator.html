<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>計算機 / Calculator</title>

    <script>
        (function() {
            const prefs = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","lang":"auto"}');
            const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const isDark = prefs.mode === 'dark' || (prefs.mode === 'system' && darkQuery.matches);
            
            document.documentElement.className = isDark ? 'dark' : 'light';
            document.documentElement.style.backgroundColor = isDark ? '#1B1C17' : '#FDFCF4';
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Potta+One&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surf: #EFF1E0;
            --on-surf: #44483D;
            --pri: #4C662B;
            --on-pri: #FFFFFF;
            --pri-c: #D7E8B7;
            --on-pri-c: #121F00;
            --sec-c: #E3E4D3;
            --sci-bg: #D7E8B7;
        }

        .dark {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surf: #2F3126;
            --on-surf: #C7C8B8;
            --pri: #B1D18A;
            --on-pri: #1F3701;
            --pri-c: #3E4A2B;
            --on-pri-c: #D7E8B7;
            --sec-c: #45483C;
            --sci-bg: #3E4A2B;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            color: var(--on-bg);
            overflow: hidden;
            font-family: 'Google Sans', sans-serif;
        }

        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px 32px;
            text-align: right;
        }

        #log-view {
            font-size: 1.4rem;
            color: var(--on-surf);
            min-height: 2.2rem;
            opacity: 0.7;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #main-view {
            font-family: 'Potta One', cursive;
            font-size: clamp(2.8rem, 14vw, 4.8rem);
            white-space: nowrap;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }

        .pad-layer {
            background: var(--surf);
            border-radius: 40px 40px 0 0;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
            transition: background 0.3s;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            color: var(--pri);
        }

        .top-nav span {
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
        }

        .sci-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 0 24px;
            height: 0;
            overflow: hidden;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sci-grid.open {
            height: 160px;
            padding: 10px 24px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 12px 24px 24px;
        }

        button {
            height: 74px;
            border: none;
            border-radius: 37px;
            font-size: 1.6rem;
            font-weight: 500;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.92);
            background: var(--pri-c);
        }

        .k-op { background: var(--pri-c); color: var(--on-pri-c); }
        .k-sci { background: var(--sci-bg); font-size: 1rem; height: 48px; border-radius: 24px; }
        .k-eq { background: var(--pri); color: var(--on-pri); font-size: 2.2rem; }

        .more-menu {
            position: absolute;
            right: 24px;
            bottom: 80px;
            background: var(--bg);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            z-index: 500;
            min-width: 180px;
        }

        .more-menu div {
            padding: 18px 24px;
            border-bottom: 1px solid var(--surf);
            white-space: nowrap;
            cursor: pointer;
        }

        .side-sheet {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: calc(40px + env(safe-area-inset-top)) 32px 32px;
        }

        .side-sheet.active { transform: translateY(0); }

        .log-card {
            padding: 20px;
            border-radius: 24px;
            background: var(--surf);
            margin-bottom: 16px;
            text-align: right;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="history-panel" class="side-sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 id="h-title" style="margin:0; font-size:1.8rem;">履歴</h1>
            <div style="display:flex; gap:24px;">
                <span class="material-symbols-outlined" onclick="clearLog()">delete</span>
                <span class="material-symbols-outlined" onclick="location.hash='#home'">close</span>
            </div>
        </div>
        <div id="history-list" style="overflow-y:auto; height:calc(100% - 120px); scrollbar-width: none;"></div>
    </div>

    <div class="display-container">
        <div id="log-view"></div>
        <div id="main-view">0</div>
    </div>

    <div class="pad-layer">
        <div class="top-nav">
            <div style="display:flex; gap:16px;">
                <span class="material-symbols-outlined" onclick="toggleSci()">science</span>
                <span class="material-symbols-outlined" onclick="location.hash='#history'">history</span>
            </div>
            <div style="position:relative;">
                <span class="material-symbols-outlined" id="more-btn" onclick="toggleMenu()">more_vert</span>
                <div id="menu-box" class="more-menu">
                    <div id="m-theme" onclick="changeTheme()">ダークモード</div>
                    <div id="m-lang" onclick="changeLang()">English</div>
                    <div id="m-copy" onclick="copyValue()">結果をコピー</div>
                </div>
            </div>
        </div>

        <div id="sci-box" class="sci-grid">
            <button class="k-sci" onclick="press('sin(')">sin</button>
            <button class="k-sci" onclick="press('cos(')">cos</button>
            <button class="k-sci" onclick="press('tan(')">tan</button>
            <button class="k-sci" onclick="press('π')">π</button>
            <button class="k-sci" onclick="press('sqrt(')">√</button>
            <button class="k-sci" onclick="press('log(')">log</button>
            <button class="k-sci" onclick="press('ln(')">ln</button>
            <button class="k-sci" onclick="press('^')">xʸ</button>
            <button class="k-sci" onclick="press('e')">e</button>
            <button class="k-sci" onclick="press('!')">n!</button>
        </div>

        <div class="main-grid">
            <button class="k-op" onclick="press('AC')">AC</button>
            <button class="k-op" onclick="press('()')">( )</button>
            <button class="k-op" onclick="press('%')">%</button>
            <button class="k-op" onclick="press('÷')">÷</button>
            
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="k-op" onclick="press('×')">×</button>
            
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="k-op" onclick="cmd('-')">-</button>
            
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="k-op" onclick="press('+')">+</button>
            
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button onclick="press('DEL')"><span class="material-symbols-outlined">backspace</span></button>
            <button class="k-eq" onclick="press('=')">=</button>
        </div>
    </div>

    <script>
        let exp = "";
        let solved = false;
        let logs = JSON.parse(localStorage.getItem('calc-log') || '[]');
        let cfg = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","lang":"ja"}');

        const i18n = {
            ja: { h: "履歴", empty: "履歴なし", err: "エラー", dark: "ダークモード", light: "ライトモード", copy: "コピー" },
            en: { h: "History", empty: "No History", err: "Error", dark: "Dark Mode", light: "Light Mode", copy: "Copy" }
        };

        function sync() {
            const h = window.location.hash;
            document.getElementById('history-panel').classList.toggle('active', h === '#history');
            if (h === '#history') buildLog();
            
            const t = i18n[cfg.lang];
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('h-title').innerText = t.h;
            document.getElementById('m-theme').innerText = isDark ? t.light : t.dark;
            document.getElementById('m-copy').innerText = t.copy;
        }

        function toggleSci() { document.getElementById('sci-box').classList.toggle('open'); }
        function toggleMenu() { const m = document.getElementById('menu-box'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function closeMenu() { document.getElementById('menu-box').style.display = 'none'; }

        function press(v) {
            const mv = document.getElementById('main-view');
            const lv = document.getElementById('log-view');
            closeMenu();

            if (v === 'AC') { exp = ""; lv.innerText = ""; solved = false; }
            else if (v === 'DEL') { exp = exp.slice(0, -1); }
            else if (v === '=') {
                if (!exp) return;
                try {
                    let formula = exp.replace(/÷/g, '/').replace(/×/g, '*')
                                     .replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E')
                                     .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(')
                                     .replace(/tan\(/g, 'Math.tan(').replace(/log\(/g, 'Math.log10(')
                                     .replace(/ln\(/g, 'Math.log(').replace(/sqrt\(/g, 'Math.sqrt(')
                                     .replace(/\^/g, '**');

                    const openP = (formula.match(/\(/g) || []).length;
                    const closeP = (formula.match(/\)/g) || []).length;
                    if (openP > closeP) formula += ')'.repeat(openP - closeP);

                    let res = eval(formula);
                    let out = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(10)).toString();
                    
                    logs.unshift({q: exp, a: out});
                    localStorage.setItem('calc-log', JSON.stringify(logs.slice(0, 30)));
                    
                    lv.innerText = exp + ' =';
                    exp = out;
                    solved = true;
                } catch { mv.innerText = i18n[cfg.lang].err; setTimeout(() => render(), 800); return; }
            } else if (v === '()') {
                const openP = (exp.match(/\(/g) || []).length, closeP = (exp.match(/\)/g) || []).length;
                exp += (openP > closeP && /[0-9)]$/.test(exp.slice(-1))) ? ')' : '(';
            } else {
                if (solved && /[0-9]/.test(v)) exp = "";
                solved = false; exp += v;
            }
            render();
        }

        function render() {
            const mv = document.getElementById('main-view');
            mv.innerText = exp || '0';
            mv.scrollLeft = mv.scrollWidth;
        }

        function copyValue() { navigator.clipboard.writeText(exp || '0'); closeMenu(); }

        function buildLog() {
            const list = document.getElementById('history-list');
            list.innerHTML = logs.length ? '' : `<div style="text-align:center; opacity:0.5; margin-top:60px;">${i18n[cfg.lang].empty}</div>`;
            logs.forEach(i => {
                const d = document.createElement('div');
                d.className = 'log-card';
                d.innerHTML = `<div style="opacity:0.6;font-size:0.9rem">${i.q}</div><div style="font-size:1.7rem;font-weight:500;">${i.a}</div>`;
                d.onclick = () => { exp = i.a; render(); location.hash='#home'; };
                list.appendChild(d);
            });
        }

        function changeTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            cfg.mode = isDark ? 'light' : 'dark';
            document.documentElement.className = cfg.mode;
            document.documentElement.style.backgroundColor = isDark ? '#FDFCF4' : '#1B1C17';
            localStorage.setItem('calc-prefs', JSON.stringify(cfg));
            sync(); closeMenu();
        }

        function changeLang() {
            cfg.lang = cfg.lang === 'ja' ? 'en' : 'ja';
            localStorage.setItem('calc-prefs', JSON.stringify(cfg));
            sync(); closeMenu();
        }

        function clearLog() { logs = []; localStorage.setItem('calc-log', '[]'); buildLog(); }

        window.onload = () => { render(); sync(); };
        window.onhashchange = sync;
        document.body.onclick = (e) => { if(!e.target.id.includes('more-btn')) closeMenu(); };
    </script>
</body>
</html>
