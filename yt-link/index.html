<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Link Service</title>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const v = params.get("v");

            if (v) {
                const type = params.get("type") || "";
                const t = params.get("t") || "";
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

                let url;
                if (type === "m") {
                    url = `https://music.youtube.com/watch?v=${v}`;
                } else if (type === "s") {
                    url = isMobile ? `https://m.youtube.com/shorts/${v}` : `https://www.youtube.com/shorts/${v}`;
                } else {
                    url = `https://youtu.be/${v}`;
                }

                if (t) {
                    url += (url.includes("?") ? "&" : "?") + "t=" + encodeURIComponent(t);
                }

                location.replace(url);
            }
        })();
    </script>

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0e7ff, #f0f2f5);
        }

        .container {
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(16px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            width: 360px;
            max-width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }

        input, button {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input {
            background: rgba(255,255,255,0.6);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.9);
        }

        button {
            background-color: #6200ee;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #3700b3;
        }

        #output {
            margin-top: 1.2rem;
            word-break: break-all;
            font-weight: 700;
            color: #1a1a1a;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        #output a {
            color: #6200ee;
            text-decoration: none;
            border-bottom: 2px solid #6200ee;
        }

        #copyBtn {
            margin-top: 1rem;
            padding: 0.6rem;
            border-radius: 10px;
            background-color: #03dac5;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: none;
        }

        #copyBtn:hover {
            background-color: #00bfa5;
        }

        #error {
            color: #b00020;
            font-weight: 700;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 YouTube Link</h1>

        <div id="form-content">
            <input type="text" id="videoInput" placeholder="動画IDまたはURLを入力" />
            <input type="text" id="t" placeholder="再生開始時間 t=xx (任意)" />
            <button id="generate">リンク生成</button>

            <div id="error"></div>
            <div id="output"></div>
            <button id="copyBtn">📋 コピー</button>
        </div>
    </div>

    <script>
        const videoInput = document.getElementById("videoInput");
        const tInput = document.getElementById("t");
        const output = document.getElementById("output");
        const error = document.getElementById("error");
        const btn = document.getElementById("generate");
        const copyBtn = document.getElementById("copyBtn");

        btn.addEventListener("click", () => {
            let input = videoInput.value.trim();
            let time = tInput.value.trim();

            error.textContent = "";
            output.innerHTML = "";
            copyBtn.style.display = "none";

            if (!input) {
                error.textContent = "⚠️ 入力してください";
                return;
            }

            let v = "";
            let type = "";
            let paramT = "";

            try {
                if (input.includes("http")) {
                    const urlObj = new URL(input);
                    const host = urlObj.hostname;

                    if (host.includes("youtube.com") || host.includes("music.youtube.com")) {
                        if (urlObj.pathname.startsWith("/watch")) {
                            v = urlObj.searchParams.get("v") || "";
                            if (host.includes("music.youtube.com")) type = "m";
                        } else if (urlObj.pathname.startsWith("/shorts/")) {
                            v = urlObj.pathname.split("/shorts/")[1].split(/[?#/]/)[0];
                            type = "s";
                        }
                        paramT = urlObj.searchParams.get("t") || "";
                    } else if (host === "youtu.be") {
                        v = urlObj.pathname.replace("/", "").split(/[?#/]/)[0];
                        paramT = urlObj.searchParams.get("t") || "";
                    }
                } else {
                    // URLではない直接のID入力の場合（ID?t=... 形式も考慮）
                    const parts = input.split(/[?&]/);
                    v = parts[0];
                    const p = new URLSearchParams(parts[1] || "");
                    if (p.get("t")) paramT = p.get("t");
                }
            } catch(e) {
                v = input; 
            }

            // 動画IDが空だった場合の最終チェック
            if (!v) {
                error.textContent = "⚠️ 有効な動画IDが見つかりません";
                return;
            }

            let finalT = time || paramT;
            const base = location.origin + location.pathname;

            let link = `${base}?v=${v}`;
            if (type) link += `&type=${type}`;
            if (finalT) link += `&t=${encodeURIComponent(finalT)}`;

            output.innerHTML = `✅ <a href="${link}" target="_blank">${link}</a>`;
            copyBtn.style.display = "inline-block";
        });

        copyBtn.addEventListener("click", () => {
            const a = output.querySelector("a");
            if (a && a.href) {
                navigator.clipboard.writeText(a.href).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "✅ コピーしました";
                    setTimeout(() => copyBtn.textContent = originalText, 2000);
                }).catch(() => {
                    copyBtn.textContent = "❌ 失敗";
                    setTimeout(() => copyBtn.textContent = "📋 コピー", 2000);
                });
            }
        });
    </script>

</body>
</html>
