<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Status Check</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* 背景デザイン */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  background-color: #f8fafc;
}
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(135deg,
      rgba(248,250,252,1) 0%,
      rgba(219,234,254,0.7) 30%,
      rgba(165,180,252,0.5) 60%,
      rgba(129,140,248,0.6) 100%),
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(199,210,254,0.4) 0%, transparent 50%),
    radial-gradient(circle at 40% 80%, rgba(224,231,255,0.3) 0%, transparent 60%);
  z-index: 0;
}

.level-fill {
  height: 100%;
  background-color: #4CAF50;
  text-align: center;
  color: #fff;
  font-weight: bold;
  line-height: 1.25rem;
  width: 0%;
  transition: width 0.3s ease;
}
</style>
</head>
<body>

<div class="battery-info relative z-10 bg-white/85 p-6 sm:p-6 md:p-8 rounded-xl max-w-md w-full text-center shadow-lg">
  <h1 id="title" class="text-xl sm:text-2xl md:text-3xl font-semibold mb-4">バッテリー残量チェック</h1>

  <p id="charging" class="mb-2 text-base sm:text-lg md:text-lg">充電中か: 取得中...</p>
  <p id="level-text" class="mb-2 text-base sm:text-lg md:text-lg">残量: 取得中...</p>

  <div class="level-bar w-full h-5 sm:h-6 md:h-8 bg-gray-300 rounded-full overflow-hidden mb-3">
    <div id="level-bar-fill" class="level-fill">0%</div>
  </div>

  <p id="charging-time" class="mb-1 text-sm sm:text-base md:text-base text-gray-700">充電完了まで: 取得中...</p>
  <p id="discharging-time" class="text-sm sm:text-base md:text-base text-gray-700">放電完了まで: 取得中...</p>

  <div class="flex justify-center gap-2 mt-3">
    <button class="lang-btn border border-green-500 rounded px-2 py-1 hover:bg-green-500 hover:text-white" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn border border-green-500 rounded px-2 py-1 hover:bg-green-500 hover:text-white" onclick="setLang('en')">English</button>
  </div>
</div>

<script>
let lang = navigator.language.startsWith('ja') ? 'ja' : 'en';
let currentBattery = null;

const texts = {
  ja: {
    title: "バッテリー残量チェック",
    charging: "充電中か: ",
    level: "残量: ",
    chargingTime: "充電完了まで: ",
    dischargingTime: "放電完了まで: ",
    noBattery: "情報なし",
    notCharging: "いいえ",
    chargingYes: "はい",
    unknown: "不明"
  },
  en: {
    title: "Battery Status Check",
    charging: "Charging: ",
    level: "Level: ",
    chargingTime: "Charging complete in: ",
    dischargingTime: "Discharging complete in: ",
    noBattery: "N/A",
    notCharging: "No",
    chargingYes: "Yes",
    unknown: "Unknown"
  }
};

function setLang(selected) {
  lang = selected;
  document.getElementById('title').textContent = texts[lang].title;
  updateBatteryInfo(currentBattery || {});
}

function formatTime(seconds) {
    if (seconds === Infinity || seconds === 0) return texts[lang].unknown;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return `${h}h ${m}m ${s}s`;
}

function updateBatteryInfo(battery) {
    currentBattery = battery;

    // バッテリー残量
    if (battery.level === undefined || battery.level === null) {
        document.getElementById('level-text').textContent = texts[lang].level + texts[lang].noBattery;
        document.getElementById('level-bar-fill').style.width = "100%";
        document.getElementById('level-bar-fill').textContent = texts[lang].noBattery;
    } else {
        const levelPercent = (battery.level * 100).toFixed(0);
        document.getElementById('level-text').textContent = texts[lang].level + levelPercent + "%";
        document.getElementById('level-bar-fill').style.width = levelPercent + "%";
        document.getElementById('level-bar-fill').textContent = levelPercent + "%";
    }

    // 充電中判定
    if (battery.charging === undefined || battery.charging === null) {
        document.getElementById('charging').textContent = texts[lang].charging + texts[lang].noBattery;
    } else {
        document.getElementById('charging').textContent = texts[lang].charging + (battery.charging ? texts[lang].chargingYes : texts[lang].notCharging);
    }

    // 充電・放電時間
    document.getElementById('charging-time').textContent = texts[lang].chargingTime + formatTime(battery.chargingTime);
    document.getElementById('discharging-time').textContent = texts[lang].dischargingTime + formatTime(battery.dischargingTime);
}

// Battery API 非対応対応
if ('getBattery' in navigator) {
    navigator.getBattery().then(battery => {
        updateBatteryInfo(battery);
        battery.addEventListener('levelchange', () => updateBatteryInfo(battery));
        battery.addEventListener('chargingchange', () => updateBatteryInfo(battery));
        battery.addEventListener('chargingtimechange', () => updateBatteryInfo(battery));
        battery.addEventListener('dischargingtimechange', () => updateBatteryInfo(battery));
    }).catch(() => { updateBatteryInfo({}); });
} else {
    updateBatteryInfo({});
}

// 初期言語反映
document.getElementById('title').textContent = texts[lang].title;
</script>

</body>
</html>
