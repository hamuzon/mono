<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>計算機 / Calculator</title>

    <script>
        (function() {
            const p = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","vibe":50}');
            const q = window.matchMedia('(prefers-color-scheme: dark)');

            const upd = (isD) => {
                document.documentElement.className = isD ? 'dark' : 'light';
                document.documentElement.style.backgroundColor = isD ? '#1B1C17' : '#FDFCF4';
            };

            if (p.mode === 'system') {
                upd(q.matches);
                q.addEventListener('change', e => upd(e.matches));
            } else {
                upd(p.mode === 'dark');
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4; --on-bg: #1B1C17;
            --surf: #EFF1E0; --on-surf: #44483D;
            --pri: #4C662B; --on-pri: #FFFFFF;
            --pri-c: #D7E8B7; --on-pri-c: #121F00;
            --sec-c: #E3E4D3; --sci-bg: #D7E8B7;
            --hdl: #74796B;
        }

        .dark {
            --bg: #1B1C17; --on-bg: #E3E4D3;
            --surf: #2F3126; --on-surf: #C7C8B8;
            --pri: #B1D18A; --on-pri: #1F3701;
            --pri-c: #3E4A2B; --on-pri-c: #D7E8B7;
            --sec-c: #45483C; --sci-bg: #3E4A2B;
            --hdl: #909284;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Google Sans', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            text-align: right;
        }

        #log-view {
            font-size: 1.6rem;
            color: var(--on-surf);
            opacity: 0.6;
            min-height: 2.2rem;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #main-view {
            font-size: clamp(3.5rem, 18vw, 7.5rem);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            line-height: 1.1;
        }

        .pad-container {
            background: var(--surf);
            border-radius: 42px 42px 0 0;
            padding: 12px 24px calc(24px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
        }

        .handle-bar {
            width: 100%;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .handle-bar::after {
            content: '';
            width: 44px;
            height: 5px;
            background: var(--hdl);
            border-radius: 3px;
            opacity: 0.3;
        }

        .action-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 20px;
        }

        .sci-drawer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .sci-drawer.active {
            height: 180px;
            opacity: 1;
            margin-bottom: 16px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            height: clamp(68px, 11vh, 88px);
            border: none;
            border-radius: 44px;
            font-size: 1.9rem;
            font-weight: 500;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, filter 0.1s;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }

        .k-op { background: var(--pri-c); color: var(--on-pri-c); }
        .k-eq { background: var(--pri); color: var(--on-pri); font-size: 2.8rem; }
        .k-sci { background: var(--sci-bg); font-size: 1.2rem; height: 56px; }

        .more-menu {
            position: absolute;
            right: 24px;
            bottom: 120px;
            background: var(--bg);
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            z-index: 999;
            min-width: 220px;
            overflow: hidden;
        }

        .more-menu div {
            padding: 22px 28px;
            border-bottom: 1px solid var(--surf);
            cursor: pointer;
        }

        @media (min-width: 850px) or (orientation: landscape) {
            .pad-container { border-radius: 0; }
            .handle-bar { display: none; }
            .sci-drawer { 
                display: grid !important; 
                height: auto !important; 
                opacity: 1 !important;
                grid-template-columns: repeat(2, 1fr);
                width: 30%;
                margin: 0;
            }
            .layout-flex { display: flex; gap: 20px; }
            .main-grid { flex: 1; }
        }
    </style>
</head>
<body>

    <section class="display-area">
        <div id="log-view"></div>
        <div id="main-view">0</div>
    </section>

    <nav class="pad-container">
        <div class="handle-bar" onclick="toggleSci()"></div>

        <div class="action-strip">
            <span class="material-symbols-outlined" style="color:var(--pri); cursor:pointer;" onclick="location.reload()">refresh</span>
            <div style="position:relative;">
                <span class="material-symbols-outlined" style="color:var(--pri); cursor:pointer;" onclick="toggleMenu()">more_vert</span>
                <div id="drop-menu" class="more-menu">
                    <div onclick="setMode('light')">ライトモード</div>
                    <div onclick="setMode('dark')">ダークモード</div>
                    <div onclick="setMode('system')">システム同期</div>
                    <div onclick="copyRes()">結果をコピー</div>
                </div>
            </div>
        </div>

        <div class="layout-flex">
            <div id="sci-panel" class="sci-drawer">
                <button class="k-sci" onclick="run('sin(')">sin</button>
                <button class="k-sci" onclick="run('cos(')">cos</button>
                <button class="k-sci" onclick="run('tan(')">tan</button>
                <button class="k-sci" onclick="run('sqrt(')">√</button>
                <button class="k-sci" onclick="run('log(')">log</button>
                <button class="k-sci" onclick="run('ln(')">ln</button>
                <button class="k-sci" onclick="run('^')">xʸ</button>
                <button class="k-sci" onclick="run('π')">π</button>
            </div>

            <div class="main-grid">
                <button class="k-op" onclick="run('AC')">AC</button>
                <button class="k-op" onclick="run('DEL')">⌫</button>
                <button class="k-op" onclick="run('%')">%</button>
                <button class="k-op" onclick="run('÷')">÷</button>

                <button onclick="run('7')">7</button>
                <button onclick="run('8')">8</button>
                <button onclick="run('9')">9</button>
                <button class="k-op" onclick="run('×')">×</button>

                <button onclick="run('4')">4</button>
                <button onclick="run('5')">5</button>
                <button onclick="run('6')">6</button>
                <button class="k-op" onclick="run('-')">-</button>

                <button onclick="run('1')">1</button>
                <button onclick="run('2')">2</button>
                <button onclick="run('3')">3</button>
                <button class="k-op" onclick="run('+')">+</button>

                <button onclick="run('0')">0</button>
                <button onclick="run('.')">.</button>
                <button class="k-eq" onclick="run('=')" style="grid-column: span 2">=</button>
            </div>
        </div>
    </nav>

    <script>
        let exp = "";
        let solved = false;
        let p = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","vibe":50}');

        function vib() {
            if (navigator.vibrate && p.vibe > 0) navigator.vibrate(15);
        }

        function toggleSci() {
            vib();
            document.getElementById('sci-panel').classList.toggle('active');
        }

        function toggleMenu() {
            const m = document.getElementById('drop-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function setMode(m) {
            p.mode = m;
            localStorage.setItem('calc-prefs', JSON.stringify(p));
            location.reload();
        }

        function copyRes() {
            navigator.clipboard.writeText(exp || "0");
            toggleMenu();
        }

        function run(key) {
            vib();
            const mv = document.getElementById('main-view');
            const lv = document.getElementById('log-view');

            if (key === 'AC') {
                exp = ""; lv.innerText = ""; solved = false;
            } else if (key === 'DEL') {
                exp = exp.slice(0, -1);
            } else if (key === '=') {
                if (!exp) return;
                try {
                    let f = exp.replace(/÷/g, '/').replace(/×/g, '*')
                               .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(')
                               .replace(/tan\(/g, 'Math.tan(').replace(/log\(/g, 'Math.log10(')
                               .replace(/ln\(/g, 'Math.log(').replace(/sqrt\(/g, 'Math.sqrt(')
                               .replace(/π/g, 'Math.PI').replace(/\^/g, '**');

                    if (f === "0/0") {
                        mv.innerText = "結果なし";
                        exp = ""; solved = true; return;
                    }

                    const o = (f.match(/\(/g) || []).length;
                    const c = (f.match(/\)/g) || []).length;
                    if (o > c) f += ')'.repeat(o - c);

                    let res = eval(f);

                    if (isNaN(res) || !isFinite(res)) {
                        mv.innerText = "エラー";
                    } else {
                        lv.innerText = exp + " =";
                        exp = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(10)).toString();
                        mv.innerText = exp;
                    }
                    solved = true;
                    return;
                } catch {
                    mv.innerText = "エラー";
                    setTimeout(() => mv.innerText = exp || "0", 1000);
                    return;
                }
            } else {
                if (solved && /[0-9]/.test(key)) exp = "";
                solved = false;
                exp += key;
            }

            mv.innerText = exp || "0";
            mv.scrollLeft = mv.scrollWidth;
            document.getElementById('drop-menu').style.display = 'none';
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.more-menu') && !e.target.innerText.includes('more_vert')) {
                document.getElementById('drop-menu').style.display = 'none';
            }
        });
    </script>
</body>
</html>
