<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Status Check</title>
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 1s ease, color 1s ease;
    font-family: sans-serif;
}

body.light {
    background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(175,109,255,0.85), transparent 68%),
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(255,100,180,0.75), transparent 68%),
        radial-gradient(ellipse 60% 50% at 60% 65%, rgba(255,235,170,0.98), transparent 68%),
        radial-gradient(ellipse 65% 40% at 50% 60%, rgba(120,190,255,0.3), transparent 68%),
        linear-gradient(180deg, #f7eaff 0%, #fde2ea 100%);
    color: #000;
}

body.dark {
    background-color: #0a0a0a;
    background-image:
        radial-gradient(ellipse at 20% 30%, rgba(56,189,248,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(139,92,246,0.3) 0%, transparent 70%),
        radial-gradient(ellipse at 60% 20%, rgba(236,72,153,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 80%, rgba(34,197,94,0.2) 0%, transparent 65%);
    color: #fff;
}

.battery-info {
    position: relative;
    z-index: 10;
    background-color: rgba(255, 255, 255, 0.85);
    padding: 2rem;
    border-radius: 1rem;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

body.dark .battery-info {
    background-color: rgba(20,20,20,0.85);
    color: #fff;
}

.level-bar {
    width: 100%;
    height: 1.5rem;
    background-color: #ccc;
    border-radius: 0.75rem;
    overflow: hidden;
    margin-bottom: 1rem;
}

.level-fill {
    height: 100%;
    background-color: #4CAF50;
    color: #fff;
    font-weight: bold;
    line-height: 1.5rem;
    width: 0%;
    text-align: center;
    transition: width 0.3s ease;
}

.lang-btn {
    border: 1px solid #4CAF50;
    border-radius: 0.25rem;
    padding: 0.25rem 0.75rem;
    cursor: pointer;
    transition: 0.3s;
    background-color: transparent;
    color: inherit;
}

.lang-btn:hover {
    background-color: #4CAF50;
    color: #fff;
}
</style>
</head>
<body>

<div class="battery-info">

    <h1 id="title" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">
        バッテリー残量チェック
    </h1>

    <p id="charging" style="font-size: 1.1rem; margin-bottom: 0.5rem;">
        充電中?: Loading...
    </p>

    <p id="level-text" style="font-size: 1.1rem; margin-bottom: 1rem;">
        残量: Loading...
    </p>

    <div class="level-bar">
        <div id="level-bar-fill" class="level-fill">0%</div>
    </div>

    <div style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;">
        <button class="lang-btn" onclick="setLang('ja')">日本語</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>

</div>

<script>
let lang = navigator.language.startsWith('ja') ? 'ja' : 'en';
let currentBattery = null;

const texts = {
    ja: {
        title: "バッテリー残量チェック",
        charging: "充電中?: ",
        level: "残量: ",
        noBattery: "情報なし",
        notCharging: "いいえ",
        chargingYes: "はい"
    },
    en: {
        title: "Battery Status Check",
        charging: "Charging: ",
        level: "Level: ",
        noBattery: "N/A",
        notCharging: "No",
        chargingYes: "Yes"
    }
};

function setLang(selected) {
    lang = selected;
    document.getElementById('title').textContent = texts[lang].title;
    updateBatteryInfo(currentBattery || {});
}

function updateBatteryInfo(battery) {
    currentBattery = battery;

    const levelPercent = battery.level != null ? (battery.level * 100).toFixed(0) : texts[lang].noBattery;

    document.getElementById('level-text').textContent =
        texts[lang].level + (battery.level != null ? levelPercent + "%" : texts[lang].noBattery);

    document.getElementById('level-bar-fill').style.width =
        battery.level != null ? `${levelPercent}%` : "100%";

    document.getElementById('level-bar-fill').textContent =
        battery.level != null ? `${levelPercent}%` : texts[lang].noBattery;

    document.getElementById('charging').textContent =
        texts[lang].charging +
        (battery.charging != null ? (battery.charging ? texts[lang].chargingYes : texts[lang].notCharging) : texts[lang].noBattery);
}

if ('getBattery' in navigator) {
    navigator.getBattery().then(bat => {
        updateBatteryInfo({level: bat.level, charging: bat.charging});
        bat.addEventListener('levelchange', () => updateBatteryInfo({level: bat.level, charging: bat.charging}));
        bat.addEventListener('chargingchange', () => updateBatteryInfo({level: bat.level, charging: bat.charging}));
    }).catch(() => updateBatteryInfo({}));
} else {
    updateBatteryInfo({});
}

function setMode() {
    const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.body.classList.remove('light','dark');
    document.body.classList.add(dark ? 'dark' : 'light');
}

setMode();
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", setMode);

document.getElementById('title').textContent = texts[lang].title;
</script>

</body>
</html>
