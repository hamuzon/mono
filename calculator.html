<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>計算機 / Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Potta+One&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <script>
        (function() {
            const cfg = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system"}');
            const dark = window.matchMedia('(prefers-color-scheme: dark)');
            
            const up = (isD) => {
                document.documentElement.className = isD ? 'dark' : 'light';
                document.documentElement.style.backgroundColor = isD ? '#1B1C17' : '#FDFCF4';
            };

            if (cfg.mode === 'system') {
                up(dark.matches);
                dark.addEventListener('change', e => up(e.matches));
            } else {
                up(cfg.mode === 'dark');
            }
        })();
    </script>

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surf: #EFF1E0;
            --on-surf: #44483D;
            --pri: #4C662B;
            --on-pri: #FFFFFF;
            --pri-c: #D7E8B7;
            --on-pri-c: #121F00;
            --hdl: #74796B;
        }

        .dark {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surf: #2F3126;
            --on-surf: #C7C8B8;
            --pri: #B1D18A;
            --on-pri: #1F3701;
            --pri-c: #3E4A2B;
            --on-pri-c: #D7E8B7;
            --hdl: #909284;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', sans-serif;
            overflow: hidden;
            overscroll-behavior-y: auto;
        }

        body {
            display: flex;
            flex-direction: column;
        }


        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 32px 20px;
            text-align: right;
        }

        #log-text {
            font-size: 1.6rem;
            color: var(--on-surf);
            opacity: 0.7;
            min-height: 2.4rem;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #main-text {
            font-family: 'Potta One', cursive;
            font-size: clamp(3.5rem, 16vw, 6.5rem);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            line-height: 1.1;
        }


        .pad-layer {
            background: var(--surf);
            border-radius: 40px 40px 0 0;
            padding: 10px 24px calc(20px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        .handle {
            width: 100%;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .handle::after {
            content: '';
            width: 44px;
            height: 5px;
            background: var(--hdl);
            border-radius: 3px;
            opacity: 0.4;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px 16px;
        }

        .action-bar span {
            color: var(--pri);
            cursor: pointer;
            font-size: 28px;
            padding: 8px;
        }


        .sci-box {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sci-box.open {
            height: 130px;
            opacity: 1;
            margin-bottom: 16px;
        }


        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            height: clamp(68px, 11vh, 90px);
            border: none;
            border-radius: 45px;
            font-size: 1.9rem;
            font-weight: 500;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.9);
        }

        .k-op { 
            background: var(--pri-c); 
            color: var(--on-pri-c); 
        }
        
        .k-eq { 
            background: var(--pri); 
            color: var(--on-pri); 
            font-size: 2.8rem; 
        }
        
        .k-sci { 
            background: var(--pri-c); 
            font-size: 1.1rem; 
            height: 54px; 
        }


        .sheet {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: calc(50px + env(safe-area-inset-top)) 32px 32px;
        }

        .sheet.active { 
            transform: translateY(0); 
        }

        .history-card {
            padding: 24px;
            border-radius: 28px;
            background: var(--surf);
            margin-bottom: 16px;
            text-align: right;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="history-panel" class="sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 style="margin:0; font-size:2.2rem; font-weight:400;">履歴</h1>
            <span class="material-symbols-outlined" style="font-size:2.2rem; cursor:pointer;" onclick="location.hash='#home'">close</span>
        </div>
        <div id="history-list" style="overflow-y:auto; height:80%; scrollbar-width:none;"></div>
    </div>

    <section class="display-area">
        <div id="log-text"></div>
        <div id="main-text">0</div>
    </section>

    <section class="pad-layer">
        <div class="handle" onclick="toggleSci()"></div>

        <div class="action-bar">
            <span class="material-symbols-outlined" onclick="location.hash='#history'">history</span>
            <span class="material-symbols-outlined" onclick="cycleTheme()">brightness_medium</span>
        </div>

        <div id="sci-box" class="sci-box">
            <button class="k-sci" onclick="press('sin(')">sin</button>
            <button class="k-sci" onclick="press('cos(')">cos</button>
            <button class="k-sci" onclick="press('tan(')">tan</button>
            <button class="k-sci" onclick="press('sqrt(')">√</button>
            <button class="k-sci" onclick="press('π')">π</button>
            <button class="k-sci" onclick="press('log(')">log</button>
            <button class="k-sci" onclick="press('ln(')">ln</button>
            <button class="k-sci" onclick="press('^')">^</button>
            <button class="k-sci" onclick="press('(')">(</button>
            <button class="k-sci" onclick="press(')')">)</button>
        </div>

        <div class="main-grid">
            <button class="k-op" onclick="press('AC')">AC</button>
            <button class="k-op" onclick="press('DEL')">⌫</button>
            <button class="k-op" onclick="press('%')">%</button>
            <button class="k-op" onclick="press('÷')">÷</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="k-op" onclick="press('×')">×</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="k-op" onclick="press('-')">-</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="k-op" onclick="press('+')">+</button>

            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button class="k-eq" onclick="press('=')" style="grid-column: span 2">=</button>
        </div>
    </section>

    <script>
        let exp = "";
        let solved = false;
        let logs = JSON.parse(localStorage.getItem('calc-log') || '[]');


        function sync() {
            const h = window.location.hash;
            document.getElementById('history-panel').classList.toggle('active', h === '#history');
            
            if (h === '#history') {
                const list = document.getElementById('history-list');
                list.innerHTML = logs.length ? 
                    logs.map(i => `<div class="history-card" onclick="reuse('${i.a}')"><div style="opacity:0.6;font-size:1rem;margin-bottom:4px;">${i.q}</div><div style="font-size:1.8rem;font-weight:500;">${i.a}</div></div>`).join('') :
                    '<div style="text-align:center;opacity:0.5;margin-top:40px;">履歴はありません</div>';
            }
        }


        function reuse(val) {
            exp = val;
            render();
            location.hash = '#home';
        }


        function toggleSci() {
            document.getElementById('sci-box').classList.toggle('open');
        }


        function cycleTheme() {
            const cfg = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system"}');
            const modes = ['system', 'light', 'dark'];
            cfg.mode = modes[(modes.indexOf(cfg.mode) + 1) % modes.length];
            localStorage.setItem('calc-prefs', JSON.stringify(cfg));
            location.reload();
        }


        function press(v) {
            const mv = document.getElementById('main-text');
            const lv = document.getElementById('log-text');

            if (v === 'AC') {
                exp = ""; lv.innerText = ""; solved = false;
            } else if (v === 'DEL') {
                exp = exp.slice(0, -1);
            } else if (v === '=') {
                if (!exp) return;
                try {
                    let f = exp.replace(/÷/g, '/').replace(/×/g, '*')
                               .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(')
                               .replace(/tan\(/g, 'Math.tan(').replace(/log\(/g, 'Math.log10(')
                               .replace(/ln\(/g, 'Math.log(').replace(/sqrt\(/g, 'Math.sqrt(')
                               .replace(/π/g, 'Math.PI').replace(/\^/g, '**');

                    if (f.includes('/0')) { mv.innerText = "エラー"; exp = ""; return; }
                    
                    let res = eval(f);
                    let out = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(10)).toString();
                    
                    logs.unshift({q: exp, a: out});
                    localStorage.setItem('calc-log', JSON.stringify(logs.slice(0, 20)));
                    
                    lv.innerText = exp + " =";
                    exp = out;
                    solved = true;
                } catch {
                    mv.innerText = "エラー";
                    setTimeout(render, 800);
                    return;
                }
            } else {
                if (solved && /[0-9]/.test(v)) exp = "";
                solved = false;
                exp += v;
            }
            render();
        }


        function render() {
            const mv = document.getElementById('main-text');
            mv.innerText = exp || "0";
            mv.scrollLeft = mv.scrollWidth;
        }


        window.addEventListener('keydown', (e) => {
            const map = {'Enter': '=', 'Backspace': 'DEL', 'Escape': 'AC', '*': '×', '/': '÷'};
            const k = map[e.key] || e.key;
            if (/[0-9+\-×÷.%=^()]/.test(k) || k === 'DEL' || k === 'AC' || k === '=') {
                e.preventDefault();
                press(k);
            }
        });


        window.onload = () => { render(); sync(); };
        window.onhashchange = sync;
    </script>
</body>
</html>
