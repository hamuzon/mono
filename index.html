<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>準備中 - mono.hamusata.f5.si</title>
  <meta name="description" content="ただいま準備中です。This page is under construction.">
  <meta name="keywords" content="準備中, Coming Soon, mono, hamusata, HTML, CSS, Potta One">
  <meta name="author" content="hamusata">
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Potta One', cursive;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      color: #ffffff;
    }

    .aurora-background {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(175, 109, 255, 0.85), transparent 68%),
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(255, 100, 180, 0.75), transparent 68%),
        radial-gradient(ellipse 60% 50% at 60% 65%, rgba(255, 235, 170, 0.98), transparent 68%),
        radial-gradient(ellipse 65% 40% at 50% 60%, rgba(120, 190, 255, 0.3), transparent 68%),
        linear-gradient(180deg, #f7eaff 0%, #fde2ea 100%);
      animation: auroraMove 20s linear infinite alternate;
    }

    @keyframes auroraMove {
      0% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(10px, -10px) scale(1.05); }
      50% { transform: translate(-10px, 10px) scale(1.02); }
      75% { transform: translate(5px, -5px) scale(1.03); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .content {
      position: relative;
      z-index: 1;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3rem;
      color: #ffffff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      color: #ffffff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
      margin: 0.5rem 0;
      line-height: 1.5;
    }

    footer {
      margin-top: 2rem;
      font-size: 1rem;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    .copyright-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: nowrap;
      justify-content: center;
      white-space: nowrap;
    }

    .license {
      font-size: 0.7rem;
      color: #ccc;
      margin-top: 0.3rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    footer a {
      color: #ffd1dc;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s ease, text-decoration 0.2s ease;
    }

    .license a {
      color: #ccc;
      text-decoration: underline;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      p { font-size: 1rem; }
      footer { font-size: 0.9rem; }
    }

    @media (prefers-color-scheme: dark) {
      body { color: #ffffff; }
      h1 { color: #ffffff; }
      p { color: #ffffff; }
      footer { color: #f0f0f0; }
      footer a { color: #ffd1dc; }
    }
  </style>
</head>
<body>

  <div class="aurora-background"></div>

  <div class="content">
    <h1>準備中</h1>
    <p>mono.hamusata.f5.si はただいま準備中です。</p>
    <p>This page is under construction.</p>

    <footer>
      <div class="copyright-row">
        &copy; <span id="year"></span>
        <a href="https://hamusata.f5.si" target="_blank">@hamusata</a>
      </div>
      <div class="license">
        Font: <a href="https://fonts.google.com/specimen/Potta+One" target="_blank">Potta One</a>  
        — Licensed under <a href="https://scripts.sil.org/OFL" target="_blank">SIL Open Font License 1.1</a>
      </div>
    </footer>
  </div>

  <script>
    const baseYear = 2025;
    const currentYear = new Date().getFullYear();
    document.getElementById("year").textContent =
      currentYear > baseYear ? `${baseYear}~${currentYear}` : `${baseYear}`;
  </script>

</body>
</html>
