<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>計算機 / Calculator</title>

    <script>
        (function() {
            const p = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system"}');
            const q = window.matchMedia('(prefers-color-scheme: dark)');
            
            const update = (isDark) => {
                document.documentElement.className = isDark ? 'dark' : 'light';
                document.documentElement.style.backgroundColor = isDark ? '#1B1C17' : '#FDFCF4';
            };

            if (p.mode === 'system') {
                update(q.matches);
                q.addEventListener('change', e => update(e.matches));
            } else {
                update(p.mode === 'dark');
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surf: #EFF1E0;
            --on-surf: #44483D;
            --pri: #4C662B;
            --on-pri: #FFFFFF;
            --pri-c: #D7E8B7;
            --on-pri-c: #121F00;
            --hdl: #74796B;
        }

        .dark {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surf: #2F3126;
            --on-surf: #C7C8B8;
            --pri: #B1D18A;
            --on-pri: #1F3701;
            --pri-c: #3E4A2B;
            --on-pri-c: #D7E8B7;
            --hdl: #909284;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', sans-serif;
            overflow: hidden;
            overscroll-behavior-y: contain;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .display-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px 32px;
            text-align: right;
            min-height: 200px;
        }

        #log-view {
            font-size: 1.5rem;
            color: var(--on-surf);
            opacity: 0.7;
            margin-bottom: 8px;
            min-height: 1.8rem;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        #main-view {
            font-size: clamp(3rem, 15vw, 6rem);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            line-height: 1.2;
        }

        .input-panel {
            background: var(--surf);
            border-radius: 40px 40px 0 0;
            padding: 8px 24px calc(16px + env(safe-area-inset-bottom));
            box-shadow: 0 -8px 24px rgba(0,0,0,0.05);
        }

        .handle-bar {
            width: 100%;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .handle-bar::after {
            content: '';
            width: 40px;
            height: 4px;
            background: var(--hdl);
            border-radius: 2px;
            opacity: 0.4;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 16px;
        }

        .top-actions span {
            color: var(--pri);
            cursor: pointer;
            padding: 8px;
            font-size: 24px;
            user-select: none;
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sci-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
            height: 0;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .sci-row.active {
            height: 60px;
            opacity: 1;
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: clamp(64px, 10vh, 84px);
            border: none;
            border-radius: 42px;
            font-size: 1.8rem;
            font-weight: 500;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.92); }

        .k-op { background: var(--pri-c); color: var(--on-pri-c); }
        .k-eq { background: var(--pri); color: var(--on-pri); font-size: 2.5rem; }
        .k-sci { background: var(--pri-c); font-size: 1.1rem; height: 50px; min-width: 80px; }

        .menu-pop {
            position: absolute;
            right: 24px;
            bottom: 120px;
            background: var(--bg);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            min-width: 200px;
        }

        .menu-pop div {
            padding: 18px 24px;
            border-bottom: 1px solid var(--surf);
            cursor: pointer;
        }

        .sheet {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 60px 24px;
        }

        .sheet.open { transform: translateY(0); }

        .history-item {
            padding: 20px;
            background: var(--surf);
            border-radius: 24px;
            margin-bottom: 12px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="history-sheet" class="sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
            <h2 style="margin:0;">履歴</h2>
            <span class="material-symbols-outlined" onclick="toggleHistory(false)">close</span>
        </div>
        <div id="history-list" style="overflow-y:auto; height:80%;"></div>
    </div>

    <div class="display-section">
        <div id="log-view"></div>
        <div id="main-view">0</div>
    </div>

    <div class="input-panel">
        <div class="handle-bar" onclick="toggleSci()"></div>
        
        <div class="top-actions">
            <span class="material-symbols-outlined" onclick="toggleHistory(true)">history</span>
            <div style="position:relative;">
                <span class="material-symbols-outlined" onclick="toggleMenu()">more_vert</span>
                <div id="main-menu" class="menu-pop">
                    <div onclick="setTheme('light')">ライトモード</div>
                    <div onclick="setTheme('dark')">ダークモード</div>
                    <div onclick="setTheme('system')">システム同期</div>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div id="sci-row" class="sci-row">
                <button class="k-sci" onclick="run('sin(')">sin</button>
                <button class="k-sci" onclick="run('cos(')">cos</button>
                <button class="k-sci" onclick="run('tan(')">tan</button>
                <button class="k-sci" onclick="run('sqrt(')">√</button>
                <button class="k-sci" onclick="run('π')">π</button>
                <button class="k-sci" onclick="run('^')">^</button>
            </div>

            <div class="num-grid">
                <button class="k-op" onclick="run('AC')">AC</button>
                <button class="k-op" onclick="run('DEL')">⌫</button>
                <button class="k-op" onclick="run('%')">%</button>
                <button class="k-op" onclick="run('÷')">÷</button>
                
                <button onclick="run('7')">7</button>
                <button onclick="run('8')">8</button>
                <button onclick="run('9')">9</button>
                <button class="k-op" onclick="run('×')">×</button>
                
                <button onclick="run('4')">4</button>
                <button onclick="run('5')">5</button>
                <button onclick="run('6')">6</button>
                <button class="k-op" onclick="run('-')">-</button>
                
                <button onclick="run('1')">1</button>
                <button onclick="run('2')">2</button>
                <button onclick="run('3')">3</button>
                <button class="k-op" onclick="run('+')">+</button>
                
                <button onclick="run('0')">0</button>
                <button onclick="run('.')">.</button>
                <button class="k-eq" onclick="run('=')" style="grid-column: span 2">=</button>
            </div>
        </div>
    </div>

    <script>
        let exp = "";
        let solved = false;
        let logs = JSON.parse(localStorage.getItem('calc-history') || '[]');

        function toggleSci() {
            document.getElementById('sci-row').classList.toggle('active');
        }

        function toggleMenu() {
            const m = document.getElementById('main-menu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function setTheme(m) {
            localStorage.setItem('calc-prefs', JSON.stringify({mode: m}));
            location.reload();
        }

        function toggleHistory(open) {
            const s = document.getElementById('history-sheet');
            s.classList.toggle('open', open);
            if(open) renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = logs.map(i => `<div class="history-item"><div style="opacity:0.6">${i.q}</div><div style="font-size:1.5rem">${i.a}</div></div>`).join('');
        }

        function run(key) {
            const mv = document.getElementById('main-view');
            const lv = document.getElementById('log-view');

            if (key === 'AC') { exp = ""; lv.innerText = ""; solved = false; }
            else if (key === 'DEL') { exp = exp.slice(0, -1); }
            else if (key === '=') {
                try {
                    let f = exp.replace(/÷/g, '/').replace(/×/g, '*').replace(/π/g, 'Math.PI').replace(/\^/g, '**');
                    let res = eval(f);
                    let out = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(10)).toString();
                    if(exp) {
                        logs.unshift({q: exp, a: out});
                        localStorage.setItem('calc-history', JSON.stringify(logs.slice(0, 20)));
                    }
                    lv.innerText = exp + " =";
                    exp = out;
                    solved = true;
                } catch { mv.innerText = "Error"; setTimeout(() => render(), 800); return; }
            } else {
                if (solved && /[0-9]/.test(key)) exp = "";
                solved = false;
                exp += key;
            }
            render();
        }

        function render() {
            const mv = document.getElementById('main-view');
            mv.innerText = exp || "0";
            mv.scrollLeft = mv.scrollWidth;
            document.getElementById('main-menu').style.display = 'none';
        }

        window.addEventListener('keydown', (e) => {
            const map = {'Enter': '=', 'Backspace': 'DEL', 'Escape': 'AC', '*': '×', '/': '÷'};
            const k = map[e.key] || e.key;
            if (/[0-9+\-×÷.%=^()]/.test(k) || k === 'DEL' || k === 'AC' || k === '=') {
                e.preventDefault(); run(k);
            }
        });

        document.addEventListener('click', e => {
            if(!e.target.closest('.top-actions')) document.getElementById('main-menu').style.display = 'none';
        });
    </script>
</body>
</html>
