<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>準備中 / Coming Soon - mono.hamusata.f5.si</title>
  <meta name="description" content="ただいまサイトを準備しています。This site is currently under construction.">
  <meta name="keywords" content="準備中, Coming Soon, under construction, mono, hamusata">
  <meta name="author" content="hamusata">
  <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Potta One', cursive;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      color: #ffffff;
    }

    .aurora-background {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(175, 109, 255, 0.85), transparent 68%),
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(255, 100, 180, 0.75), transparent 68%),
        radial-gradient(ellipse 60% 50% at 60% 65%, rgba(255, 235, 170, 0.98), transparent 68%),
        radial-gradient(ellipse 65% 40% at 50% 60%, rgba(120, 190, 255, 0.3), transparent 68%),
        linear-gradient(180deg, #f7eaff 0%, #fde2ea 100%);
      animation: auroraMove 20s linear infinite alternate;
    }

    @keyframes auroraMove {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-10px, 10px) scale(1.04); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .content {
      position: relative;
      z-index: 1;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: 1.4rem;
      margin-bottom: 1.2rem;
      opacity: 0.95;
    }

    p {
      font-size: 1.15rem;
      margin: 0.4rem 0;
      line-height: 1.6;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      opacity: 0.9;
    }

    footer a {
      color: #ffd1dc;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .license {
      font-size: 0.7rem;
      color: #ccc;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 1.1rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="aurora-background"></div>

  <div class="content">
    <h1>準備中</h1>
    <div class="subtitle">Coming Soon</div>

    <p>mono.hamusata.f5.si は現在準備中です。</p>
    <p>公開まで今しばらくお待ちください。</p>

    <p>This site is currently under construction.</p>
    <p>Please wait a little longer until it is ready.</p>

    <footer>
      <div>
        &copy; <span id="year"></span>
        <a href="https://hamusata.f5.si" target="_blank">@hamusata</a>
      </div>
      <div class="license">
        Font: <a href="https://fonts.google.com/specimen/Potta+One" target="_blank">Potta One</a>
        — Licensed under <a href="https://scripts.sil.org/OFL" target="_blank">SIL Open Font License 1.1</a>
      </div>
    </footer>
  </div>

  <script>
    const baseYear = 2025;
    const currentYear = new Date().getFullYear();
    document.getElementById("year").textContent =
      currentYear > baseYear ? `${baseYear}~${currentYear}` : `${baseYear}`;
  </script>

</body>
</html>
