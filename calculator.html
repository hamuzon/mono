<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>計算機 / Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surface: #EFF1E0;
            --on-surface: #44483D;
            --primary-cont: #D7E8B7;
            --on-primary-cont: #121F00;
            --sec-cont: #E3E4D3;
            --on-sec-cont: #1B1C17;
            --accent: #4C662B;
            --error: #BA1A1A;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1B1C17;
                --on-bg: #E3E4D3;
                --surface: #2F3126;
                --on-surface: #C7C8B8;
                --primary-cont: #3E4A2B;
                --on-primary-cont: #D7E8B7;
                --sec-cont: #45483C;
                --on-sec-cont: #E3E4D3;
                --accent: #B1D18A;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #history-panel {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 70%;
            background: var(--bg);
            z-index: 100;
            transition: top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--surface);
        }

        #history-panel.open {
            top: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-top: env(safe-area-inset-top);
        }

        .history-item {
            text-align: right;
            margin-bottom: 28px;
            cursor: pointer;
        }

        .history-expr {
            font-size: 1.2rem;
            color: var(--on-surface);
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .history-res {
            font-size: 2rem;
            font-weight: 500;
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 24px 32px;
            padding-top: calc(24px + env(safe-area-inset-top));
            cursor: pointer;
        }

        #sub-display {
            font-size: 1.6rem;
            color: var(--on-surface);
            min-height: 2rem;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        #main-display {
            width: 100%;
            font-size: clamp(3.5rem, 18vw, 5.5rem);
            text-align: right;
            border: none;
            background: transparent;
            color: var(--on-bg);
            outline: none;
            padding: 0;
            font-family: inherit;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 24px;
            background: var(--surface);
            border-radius: 40px 40px 0 0;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
        }

        button {
            aspect-ratio: 1/1;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background-color 0.2s, border-radius 0.2s;
        }

        button:active {
            transform: scale(0.9);
            border-radius: 28%;
        }

        .btn-num { background: var(--bg); color: var(--on-bg); }
        .btn-op { background: var(--primary-cont); color: var(--on-primary-cont); font-size: 2.2rem; }
        .btn-fn { background: var(--sec-cont); color: var(--on-sec-cont); }
        .btn-eq { background: var(--accent); color: var(--bg); border-radius: 44px; font-size: 2.2rem; }

        .material-symbols-outlined { font-size: 2.2rem; }
        .error-text { color: var(--error) !important; }

        @media (min-width: 600px) {
            .keypad, #history-panel {
                max-width: 500px;
                margin: 0 auto;
                left: 50%;
                transform: translateX(-50%);
            }
            #history-panel.open { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="history-panel">
        <div class="history-header">
            <span style="font-size: 1.4rem; font-weight: 500;">履歴</span>
            <div style="display: flex; gap: 16px; align-items: center;">
                <button onclick="clearHistory()" style="width:auto; height:44px; padding:0 20px; border-radius:22px; font-size:1rem; background:var(--sec-cont);">履歴を削除</button>
                <span class="material-symbols-outlined" onclick="toggleHistory()">close</span>
            </div>
        </div>
        <div id="history-list"></div>
    </div>

    <div class="display-area" onclick="toggleHistory()">
        <div id="sub-display"></div>
        <input type="text" id="main-display" readonly placeholder="0">
    </div>

    <div class="keypad">
        <button class="btn-fn" onclick="press('AC')">AC</button>
        <button class="btn-fn" onclick="press('()')">( )</button>
        <button class="btn-fn" onclick="press('%')">%</button>
        <button class="btn-op" onclick="press('÷')">÷</button>

        <button class="btn-num" onclick="press('7')">7</button>
        <button class="btn-num" onclick="press('8')">8</button>
        <button class="btn-num" onclick="press('9')">9</button>
        <button class="btn-op" onclick="press('×')">×</button>

        <button class="btn-num" onclick="press('4')">4</button>
        <button class="btn-num" onclick="press('5')">5</button>
        <button class="btn-num" onclick="press('6')">6</button>
        <button class="btn-op" onclick="press('−')">−</button>

        <button class="btn-num" onclick="press('1')">1</button>
        <button class="btn-num" onclick="press('2')">2</button>
        <button class="btn-num" onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('+')">+</button>

        <button class="btn-num" onclick="press('0')">0</button>
        <button class="btn-num" onclick="press('.')">.</button>
        <button class="btn-fn" onclick="press('DEL')">
            <span class="material-symbols-outlined">backspace</span>
        </button>
        <button class="btn-eq" onclick="press('=')">=</button>
    </div>

    <script>
        let currentExpr = '';
        let isEvaluated = false;
        let historyData = JSON.parse(localStorage.getItem('p10_calc_history') || '[]');

        function haptic() {
            if (navigator.vibrate) navigator.vibrate(12);
        }

        function toggleHistory() {
            haptic();
            const panel = document.getElementById('history-panel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            if (historyData.length === 0) {
                list.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:40px;">履歴はありません</p>';
                return;
            }
            historyData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div class="history-expr">${item.expr}</div><div class="history-res">${item.res}</div>`;
                div.onclick = () => {
                    currentExpr = item.res.replace(/-/g, '−');
                    document.getElementById('sub-display').innerText = '';
                    updateUI();
                    toggleHistory();
                };
                list.appendChild(div);
            });
        }

        function clearHistory() {
            haptic();
            historyData = [];
            localStorage.setItem('p10_calc_history', JSON.stringify(historyData));
            renderHistory();
        }

        function press(v) {
            haptic();
            const sub = document.getElementById('sub-display');
            
            if (v === 'AC') {
                currentExpr = '';
                sub.innerText = '';
                isEvaluated = false;
            } else if (v === 'DEL') {
                if (isEvaluated) { currentExpr = ''; isEvaluated = false; }
                else { currentExpr = currentExpr.slice(0, -1); }
            } else if (v === '=') {
                run();
                return;
            } else if (v === '()') {
                const open = (currentExpr.match(/\(/g) || []).length;
                const close = (currentExpr.match(/\)/g) || []).length;
                if (/[+−×÷(]$/.test(currentExpr) || currentExpr === '') currentExpr += '(';
                else if (open > close) currentExpr += ')';
            } else if (['+', '−', '×', '÷', '%'].includes(v)) {
                if (isEvaluated) isEvaluated = false;
                const last = currentExpr.slice(-1);
                if (/[+−×÷%]$/.test(last)) currentExpr = currentExpr.slice(0, -1) + v;
                else if (currentExpr !== '' || v === '−') currentExpr += v;
            } else {
                if (isEvaluated) { currentExpr = ''; isEvaluated = false; }
                if (currentExpr.length < 20) currentExpr += v;
            }
            updateUI();
        }

        function run() {
            if (!currentExpr) return;
            try {
                let formula = currentExpr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/%/g, '/100');
                const openCount = (formula.match(/\(/g) || []).length;
                const closeCount = (formula.match(/\)/g) || []).length;
                if (openCount > closeCount) formula += ')'.repeat(openCount - closeCount);
                
                const result = new Function('"use strict"; return (' + formula + ')')();
                const formatted = Number(result.toPrecision(12)).toString();
                
                historyData.unshift({ expr: currentExpr, res: formatted });
                if (historyData.length > 30) historyData.pop();
                localStorage.setItem('p10_calc_history', JSON.stringify(historyData));

                document.getElementById('sub-display').innerText = currentExpr + ' =';
                currentExpr = formatted.replace(/-/g, '−');
                isEvaluated = true;
                updateUI();
            } catch {
                const main = document.getElementById('main-display');
                main.value = 'エラー';
                main.classList.add('error-text');
                setTimeout(() => {
                    main.classList.remove('error-text');
                    press('AC');
                }, 1000);
            }
        }

        function updateUI() {
            const main = document.getElementById('main-display');
            main.value = currentExpr || '0';
            if (currentExpr.length > 9) main.style.fontSize = '3rem';
            else main.style.fontSize = '';
        }

        window.addEventListener('keydown', e => {
            const m = {
                'Enter': '=', 'Backspace': 'DEL', 'Escape': 'AC',
                '*': '×', '/': '÷', '-': '−', '+': '+', '%': '%'
            };
            const v = m[e.key] || (/[0-9.]/.test(e.key) ? e.key : null);
            if (v) { e.preventDefault(); press(v); }
        });
    </script>
</body>
</html>
