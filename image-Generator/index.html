<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gradient & Solid Color Image Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<div class="container">

<h1>グラデーション & 単色画像ジェネレーター</h1>

<fieldset>
<legend>色</legend>

<div class="color-list" id="colorList"></div>

<div class="button-group">
    <button id="addColor">色追加</button>
    <button id="removeColor">色削除</button>
</div>

<label>角度
<input type="number" id="angle" min="0" max="360" title="グラデーションの角度">
</label>

<div class="toggle">
    <input type="checkbox" id="singleColor" title="単色モード" aria-label="単色モード">
    <span>単色モード</span>
</div>

<div class="toggle">
    <input type="checkbox" id="randomMode" aria-label="ランダム（プレビュー時のみ）">
    <span>ランダム（プレビュー時のみ）</span>
</div>
</fieldset>

<fieldset>
<legend>サイズ</legend>

<label>プリセット
<select id="preset">
    <option value="">自由</option>
    <option value="1280x720">HD 横</option>
    <option value="720x1280">HD 縦</option>
    <option value="1920x1080">フルHD 横</option>
    <option value="1080x1920">フルHD 縦</option>
    <option value="2560x1440">2K 横</option>
    <option value="1440x2560">2K 縦</option>
    <option value="3840x2160">4K 横</option>
    <option value="2160x3840">4K 縦</option>
</select>
</label>

<label>幅(px)<input type="number" id="width" title="画像の幅"></label>
<label>高さ(px)<input type="number" id="height" title="画像の高さ"></label>
</fieldset>

<fieldset>
<legend>画像形式</legend>

<label>拡張子
<select id="ext">
    <option value="png">PNG</option>
    <option value="jpeg">JPEG</option>
    <option value="webp">WebP</option>
</select>
</label>

<label>画質
<input type="number" id="quality" min="0.1" max="1" step="0.01" title="画像の画質 (0.1 - 1.0)">
</label>
</fieldset>

<fieldset>
<legend>ファイル名</legend>

<label>名前
<input type="text" id="nameInput" placeholder="画像の名前" title="ファイル名のベーステキスト">
</label>

<div class="toggle"><input type="checkbox" id="tY" checked title="年を含める" aria-label="年"><span>年</span></div>
<div class="toggle"><input type="checkbox" id="tM" checked title="月を含める" aria-label="月"><span>月</span></div>
<div class="toggle"><input type="checkbox" id="tD" checked title="日を含める" aria-label="日"><span>日</span></div>
<div class="toggle"><input type="checkbox" id="tH" checked title="時を含める" aria-label="時"><span>時</span></div>
<div class="toggle"><input type="checkbox" id="tm" checked title="分を含める" aria-label="分"><span>分</span></div>
<div class="toggle"><input type="checkbox" id="ts" checked title="秒を含める" aria-label="秒"><span>秒</span></div>

<div class="toggle"><input type="checkbox" id="tW" checked aria-label="曜日"><span>曜日</span></div>

<label>曜日言語
<select id="weekdayLang">
    <option value="en">英語</option>
    <option value="jp">日本語</option>
</select>
</label>

<div class="toggle"><input type="checkbox" id="tID" checked title="ランダムIDを含める" aria-label="ランダムID"><span>ランダムID</span></div>

<div id="filenamePreview"></div>
</fieldset>

<fieldset>
<legend>保存 / 復元</legend>

<div class="toggle">
    <input type="checkbox" id="jsonExport" checked title="画像保存時に設定JSONも保存" aria-label="画像保存時 JSON も出力">
    <span>画像保存時 JSON も出力</span>
</div>

<div class="button-group">
    <button id="exportJson">JSON 書き出し</button>
    <button id="importJson">JSON 読み込み</button>
    <button id="saveTemplate">テンプレート保存</button>
    <button id="resetAll">初期値に戻す</button>
</div>

<input type="file" id="jsonFile" accept=".json" hidden>
</fieldset>

<div class="button-group">
    <button id="previewBtn">プレビュー</button>
    <button id="saveBtn">保存</button>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>


</div>
</body>
</html>
