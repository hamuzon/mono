<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>計算 / Calculator</title>

    <script>
        (function() {
            const cfg = JSON.parse(localStorage.getItem('calc_cfg') || '{"theme":"system"}');
            const isDark = cfg.theme === 'dark' || (cfg.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark');
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4;
            --on-bg: #1B1C17;
            --surface: #EFF1E0;
            --on-surface: #44483D;
            --primary: #4C662B;
            --on-primary: #FFFFFF;
            --primary-cont: #D7E8B7;
            --on-primary-cont: #121F00;
            --sec-cont: #E3E4D3;
            --on-sec-cont: #1B1C17;
            --radius: 36px;
        }

        .dark {
            --bg: #1B1C17;
            --on-bg: #E3E4D3;
            --surface: #2F3126;
            --on-surface: #C7C8B8;
            --primary: #B1D18A;
            --on-primary: #1F3701;
            --primary-cont: #3E4A2B;
            --on-primary-cont: #D7E8B7;
            --sec-cont: #45483C;
            --on-sec-cont: #E3E4D3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            height: 100dvh;
            background: var(--bg);
            color: var(--on-bg);
            font-family: 'Google Sans', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* 拡大時のスクロールを許可 */
        }

        .overlay {
            position: fixed;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: calc(24px + env(safe-area-inset-top)) 24px 24px;
            display: flex; flex-direction: column;
        }

        .overlay.open { top: 0; }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 24px 32px;
            min-height: 200px;
        }

        #sub-display {
            font-size: 1.5rem;
            color: var(--on-surface);
            opacity: 0.7;
            min-height: 2rem;
            text-align: right;
            margin-bottom: 8px;
            word-break: break-all;
        }

        #main-input {
            width: 100%;
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            text-align: right;
            border: none;
            background: transparent;
            color: var(--on-bg);
            outline: none;
            font-family: inherit;
        }

        .pad-container {
            background: var(--surface);
            border-radius: 40px 40px 0 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            transition: all 0.3s ease;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 12px 32px 4px;
            color: var(--primary);
        }

        .toolbar span { cursor: pointer; padding: 10px; font-size: 1.8rem; }

        .adv-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 24px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .adv-pad.show {
            max-height: 200px;
            opacity: 1;
            padding: 16px 24px 8px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 8px 24px 16px;
        }

        button {
            height: 68px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.6rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--on-bg);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .adv-pad.show ~ .main-grid button {
            height: 54px;
            font-size: 1.4rem;
        }

        button:active { transform: scale(0.92); filter: brightness(0.9); }

        .btn-op { background: var(--primary-cont); color: var(--on-primary-cont); }
        .btn-fn { background: var(--sec-cont); color: var(--on-sec-cont); }
        .btn-eq { background: var(--primary); color: var(--on-primary); font-size: 2.2rem; }
        .btn-adv { background: transparent; font-size: 1.1rem; height: 44px; color: var(--on-surface); }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--sec-cont);
        }

        .hist-card { text-align: right; margin-bottom: 32px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="settings-ui" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <span style="font-size:1.6rem; font-weight:500;">設定 / Settings</span>
            <span class="material-symbols-outlined" onclick="ui('settings')">close</span>
        </div>
        <div class="setting-row">
            <span>テーマ / Theme</span>
            <select id="theme-select" onchange="saveConfig()" style="padding:8px; border-radius:8px; font-family:inherit;">
                <option value="system">システム / System</option>
                <option value="light">ライト / Light</option>
                <option value="dark">ダーク / Dark</option>
            </select>
        </div>
        <div class="setting-row">
            <span>振動 / Vibration</span>
            <input type="range" id="vibe-control" min="0" max="100" step="10" onchange="saveConfig()">
        </div>
    </div>

    <div id="history-ui" class="overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <span style="font-size:1.6rem; font-weight:500;">履歴 / History</span>
            <div style="display:flex; gap:20px;">
                <span class="material-symbols-outlined" onclick="clearH()">delete</span>
                <span class="material-symbols-outlined" onclick="ui('history')">close</span>
            </div>
        </div>
        <div id="history-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div class="display-area">
        <div id="sub-display"></div>
        <input type="text" id="main-input" readonly value="0">
    </div>

    <div class="pad-container">
        <div class="toolbar">
            <span class="material-symbols-outlined" onclick="ui('settings')">settings</span>
            <span class="material-symbols-outlined" onclick="ui('history')">history</span>
            <span class="material-symbols-outlined" id="adv-toggle" onclick="toggleAdv()">keyboard_arrow_down</span>
        </div>

        <div class="adv-pad" id="adv-pad">
            <button class="btn-adv" onclick="push('sin(')">sin</button>
            <button class="btn-adv" onclick="push('cos(')">cos</button>
            <button class="btn-adv" onclick="push('tan(')">tan</button>
            <button class="btn-adv" onclick="push('π')">π</button>
            <button class="btn-adv" onclick="push('ln(')">ln</button>
            <button class="btn-adv" onclick="push('log(')">log</button>
            <button class="btn-adv" onclick="push('^')">^</button>
            <button class="btn-adv" onclick="push('√(')">√</button>
        </div>

        <div class="main-grid">
            <button class="btn-fn" onclick="push('AC')">AC</button>
            <button class="btn-fn" onclick="push('()')">( )</button>
            <button class="btn-fn" onclick="push('%')">%</button>
            <button class="btn-op" onclick="push('÷')">÷</button>
            <button onclick="push('7')">7</button>
            <button onclick="push('8')">8</button>
            <button onclick="push('9')">9</button>
            <button class="btn-op" onclick="push('×')">×</button>
            <button onclick="push('4')">4</button>
            <button onclick="push('5')">5</button>
            <button onclick="push('6')">6</button>
            <button class="btn-op" onclick="push('−')">−</button>
            <button onclick="push('1')">1</button>
            <button onclick="push('2')">2</button>
            <button onclick="push('3')">3</button>
            <button class="btn-op" onclick="push('+')">+</button>
            <button onclick="push('0')">0</button>
            <button onclick="push('.')">.</button>
            <button class="btn-fn" onclick="push('DEL')"><span class="material-symbols-outlined">backspace</span></button>
            <button class="btn-eq" onclick="push('=')">=</button>
        </div>
    </div>

    <script>
        let expr = localStorage.getItem('calc_expr') || '';
        let hist = JSON.parse(localStorage.getItem('calc_hist') || '[]');
        let cfg = JSON.parse(localStorage.getItem('calc_cfg') || '{"theme":"system","vibe":30}');
        let isRes = false;

        function haptic() { if(cfg.vibe > 0 && navigator.vibrate) navigator.vibrate(cfg.vibe/2); }

        function saveConfig() {
            cfg.theme = document.getElementById('theme-select').value;
            cfg.vibe = document.getElementById('vibe-control').value;
            localStorage.setItem('calc_cfg', JSON.stringify(cfg));
            const isDark = cfg.theme === 'dark' || (cfg.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            haptic();
        }

        function ui(type) { haptic(); document.getElementById(type + '-ui').classList.toggle('open'); if(type==='history') renderH(); }

        function toggleAdv() {
            haptic();
            const p = document.getElementById('adv-pad'), i = document.getElementById('adv-toggle');
            p.classList.toggle('show');
            i.innerText = p.classList.contains('show') ? 'keyboard_arrow_up' : 'keyboard_arrow_down';
        }

        function push(v) {
            haptic();
            const m = document.getElementById('main-input'), s = document.getElementById('sub-display');
            if(v === 'AC') { expr = ''; s.innerText = ''; isRes = false; }
            else if(v === 'DEL') { expr = expr.slice(0, -1); }
            else if(v === '=') {
                if(!expr) return;
                try {
                    let proc = expr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/π/g, 'Math.PI').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/ln\(/g, 'Math.log(').replace(/log\(/g, 'Math.log10(').replace(/\^/g, '**').replace(/√\(/g, 'Math.sqrt(');
                    proc = proc.replace(/(\d)\(/g, '$1*(').replace(/\)(\d)/g, ')*$1');
                    const diff = (proc.match(/\(/g) || []).length - (proc.match(/\)/g) || []).length;
                    if(diff > 0) proc += ')'.repeat(diff);
                    let res = eval(proc);
                    let final = Number(parseFloat(res.toPrecision(15)).toString()).toString();
                    hist.unshift({q: expr, a: final});
                    localStorage.setItem('calc_hist', JSON.stringify(hist.slice(0, 30)));
                    s.innerText = expr + ' =';
                    expr = final.replace(/-/g, '−');
                    isRes = true;
                } catch { m.value = 'Error'; setTimeout(()=>render(), 800); return; }
            } else if(v === '()') {
                const o = (expr.match(/\(/g) || []).length, c = (expr.match(/\)/g) || []).length;
                expr += (o > c && /[0-9π)]$/.test(expr.slice(-1))) ? ')' : (expr === '' || /[+−×÷(]$/.test(expr) ? '(' : '×(');
            } else {
                if(isRes && /[0-9π]/.test(v)) { expr = ''; isRes = false; }
                expr += v;
            }
            render();
        }

        function render() {
            document.getElementById('main-input').value = expr || '0';
            localStorage.setItem('calc_expr', expr);
        }

        function renderH() {
            const l = document.getElementById('history-list');
            l.innerHTML = hist.length ? '' : '<p style="text-align:center; opacity:0.5;">No History</p>';
            hist.forEach(h => {
                const d = document.createElement('div');
                d.className = 'hist-card';
                d.innerHTML = `<div style="opacity:0.6;">${h.q}</div><div style="font-size:1.8rem; font-weight:500;">${h.a}</div>`;
                d.onclick = () => { expr = h.a.replace(/-/g, '−'); render(); ui('history'); };
                l.appendChild(d);
            });
        }

        function clearH() { haptic(); hist = []; localStorage.setItem('calc_hist', '[]'); renderH(); }

        window.onload = () => {
            document.getElementById('theme-select').value = cfg.theme;
            document.getElementById('vibe-control').value = cfg.vibe;
            render();
        };
    </script>
</body>
</html>
