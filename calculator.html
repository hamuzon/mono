<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Advanced Calculator</title>

    <script>
        (function() {
            const prefs = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system"}');
            const isDark = prefs.mode === 'dark' || (prefs.mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.className = isDark ? 'dark' : 'light';
            document.documentElement.style.backgroundColor = isDark ? '#1B1C17' : '#FDFCF4';
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4; --on-bg: #1B1C17;
            --surf: #EFF1E0; --on-surf: #44483D;
            --pri: #4C662B; --on-pri: #FFFFFF;
            --pri-c: #D7E8B7; --on-pri-c: #121F00;
            --sec-c: #E3E4D3; --sci-bg: #D7E8B7;
        }
        .dark {
            --bg: #1B1C17; --on-bg: #E3E4D3;
            --surf: #2F3126; --on-surf: #C7C8B8;
            --pri: #B1D18A; --on-pri: #1F3701;
            --pri-c: #3E4A2B; --on-pri-c: #D7E8B7;
            --sec-c: #45483C; --sci-bg: #3E4A2B;
        }

        body {
            margin: 0; height: 100dvh; display: flex; flex-direction: column;
            background: var(--bg); color: var(--on-bg); overflow: hidden;
            font-family: 'Google Sans', sans-serif;
        }

        /* 表示エリア */
        .display {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 24px 32px; text-align: right;
        }
        #log { font-size: 1.4rem; opacity: 0.6; min-height: 2rem; overflow-x: auto; white-space: nowrap; }
        #main { font-size: clamp(3rem, 15vw, 5rem); padding: 8px 0; overflow-x: auto; white-space: nowrap; }

        /* 操作パネル */
        .controls {
            background: var(--surf); border-radius: 32px 32px 0 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tool-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; color: var(--pri);
        }

        /* 関数パネル（スライド式） */
        .sci-panel {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            padding: 0 20px; height: 0; overflow: hidden;
            transition: height 0.3s ease, padding 0.3s ease;
        }
        .sci-panel.open { height: 160px; padding: 10px 20px; }

        /* キーパッド */
        .key-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; padding: 12px 20px 24px;
        }

        button {
            height: 72px; border: none; border-radius: 36px;
            font-size: 1.5rem; background: var(--bg); color: var(--on-bg);
            display: flex; align-items: center; justify-content: center;
            transition: 0.1s; cursor: pointer;
        }
        button:active { transform: scale(0.9); background: var(--pri-c); }
        .k-op { background: var(--pri-c); color: var(--on-pri-c); }
        .k-sci { background: var(--sci-bg); font-size: 1.1rem; height: 48px; }
        .k-eq { background: var(--pri); color: var(--on-pri); font-size: 2rem; }

        /* メニュー */
        #menu {
            position: absolute; right: 20px; bottom: 80px;
            background: var(--bg); border-radius: 16px; display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 100;
        }
        #menu div { padding: 16px 24px; border-bottom: 1px solid var(--surf); }
    </style>
</head>

<body>

    <div class="display">
        <div id="log"></div>
        <div id="main">0</div>
    </div>

    <div class="controls">
        <div class="tool-bar">
            <div style="display:flex; gap:16px;">
                <span class="material-symbols-outlined" onclick="toggleSci()">science</span>
                <span class="material-symbols-outlined" onclick="location.reload()">history</span>
            </div>
            <div style="position:relative;">
                <span class="material-symbols-outlined" onclick="toggleMenu()">more_vert</span>
                <div id="menu">
                    <div onclick="setTheme('light')">Light Mode</div>
                    <div onclick="setTheme('dark')">Dark Mode</div>
                    <div onclick="alert('Unit Converter Coming Soon!')">Unit Converter</div>
                </div>
            </div>
        </div>

        <div id="sci-panel" class="sci-panel">
            <button class="k-sci" onclick="cmd('sin(')">sin</button>
            <button class="k-sci" onclick="cmd('cos(')">cos</button>
            <button class="k-sci" onclick="cmd('tan(')">tan</button>
            <button class="k-sci" onclick="cmd('π')">π</button>
            <button class="k-sci" onclick="cmd('e')">e</button>
            <button class="k-sci" onclick="cmd('log(')">log</button>
            <button class="k-sci" onclick="cmd('ln(')">ln</button>
            <button class="k-sci" onclick="cmd('^')">xʸ</button>
            <button class="k-sci" onclick="cmd('sqrt(')">√</button>
            <button class="k-sci" onclick="cmd('!')">n!</button>
        </div>

        <div class="key-grid">
            <button class="k-op" onclick="cmd('AC')">AC</button>
            <button class="k-op" onclick="cmd('()')">( )</button>
            <button class="k-op" onclick="cmd('%')">%</button>
            <button class="k-op" onclick="cmd('÷')">÷</button>
            
            <button onclick="cmd('7')">7</button>
            <button onclick="cmd('8')">8</button>
            <button onclick="cmd('9')">9</button>
            <button class="k-op" onclick="cmd('×')">×</button>
            
            <button onclick="cmd('4')">4</button>
            <button onclick="cmd('5')">5</button>
            <button onclick="cmd('6')">6</button>
            <button class="k-op" onclick="cmd('-')">-</button>
            
            <button onclick="cmd('1')">1</button>
            <button onclick="cmd('2')">2</button>
            <button onclick="cmd('3')">3</button>
            <button class="k-op" onclick="cmd('+')">+</button>
            
            <button onclick="cmd('0')">0</button>
            <button onclick="cmd('.')">.</button>
            <button onclick="cmd('DEL')"><span class="material-symbols-outlined">backspace</span></button>
            <button class="k-eq" onclick="cmd('=')">=</button>
        </div>
    </div>

    <script>
        let buf = "";
        let solved = false;

        function toggleSci() { document.getElementById('sci-panel').classList.toggle('open'); }
        function toggleMenu() { const m = document.getElementById('menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }

        function cmd(v) {
            const m = document.getElementById('main');
            const l = document.getElementById('log');
            if(v === 'AC') { buf = ""; l.innerText = ""; solved = false; }
            else if(v === 'DEL') { buf = buf.slice(0, -1); }
            else if(v === '=') {
                try {
                    let exp = buf.replace(/÷/g, '/').replace(/×/g, '*')
                                 .replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E')
                                 .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(')
                                 .replace(/tan\(/g, 'Math.tan(').replace(/log\(/g, 'Math.log10(')
                                 .replace(/ln\(/g, 'Math.log(').replace(/sqrt\(/g, 'Math.sqrt(')
                                 .replace(/\^/g, '**');
                    
                    // 括弧の自動補完
                    const o = (exp.match(/\(/g) || []).length;
                    const c = (exp.match(/\)/g) || []).length;
                    if(o > c) exp += ')'.repeat(o - c);

                    let res = eval(exp);
                    l.innerText = buf + " =";
                    buf = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(8)).toString();
                    solved = true;
                } catch { m.innerText = "Error"; setTimeout(() => m.innerText = buf || "0", 800); return; }
            } else if(v === '()') {
                const o = (buf.match(/\(/g) || []).length, c = (buf.match(/\)/g) || []).length;
                buf += (o > c && /[0-9)]$/.test(buf.slice(-1))) ? ")" : "(";
            } else {
                if(solved && /[0-9]/.test(v)) buf = "";
                solved = false; buf += v;
            }
            m.innerText = buf || "0";
            m.scrollLeft = m.scrollWidth;
        }

        function setTheme(t) {
            localStorage.setItem('calc-prefs', JSON.stringify({mode: t}));
            location.reload();
        }

        window.onclick = (e) => { if(!e.target.innerText.includes('more_vert')) document.getElementById('menu').style.display = 'none'; };
    </script>
</body>
</html>
