<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Canvas App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
        <link rel="stylesheet" href="style.css">


</head>

<body data-theme="dark">

    <div id="brush-cursor"></div>

    <div id="project-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <h2 class="modal-title">GALLERY</h2>
            <div id="project-list" class="modal-scroll-area"></div>
            <button class="primary-btn" onclick="ui.showCreate()">新規作成</button>
            <button class="primary-btn secondary" onclick="ui.closeProjects()">戻る</button>
        </div>
    </div>

    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <h2 class="modal-title">NEW ARTWORK</h2>
            <input type="text" id="art-name-input" placeholder="名前を入力..." class="modal-input">
            
            <select id="res-preset" onchange="ui.onPresetChange()" class="modal-select" title="解像度プリセット">
                <option value="1080x1080" selected>正方形 (1080x1080)</option>
                <option value="1280x720">横長 (1280x720)</option>
                <option value="720x1280">縦長 (720x1280)</option>
                <option value="custom">カスタムサイズ</option>
            </select>
            
            <div id="custom-fields" class="modal-custom-fields">
                <input type="number" id="in-w" value="1080" class="modal-input-small" title="幅" aria-label="キャンバスの幅">
                <input type="number" id="in-h" value="1080" class="modal-input-small" title="高さ" aria-label="キャンバスの高さ">
            </div>
            
            <button class="primary-btn" onclick="app.createNew()">キャンバスを作成</button>
            <button class="primary-btn secondary" onclick="ui.closeCreate()">キャンセル</button>
        </div>
    </div>

    <header class="glass">
        <div class="header-brand">
            <button class="btn" onclick="ui.openProjects()"><span class="material-symbols-rounded">grid_view</span></button>
            <h1 class="header-title">CANVAS APP</h1>
        </div>
        <div class="header-actions">
            <button class="btn" onclick="app.undo()"><span class="material-symbols-rounded">undo</span></button>
            <button class="btn" onclick="app.redo()"><span class="material-symbols-rounded">redo</span></button>
            <button class="btn" onclick="ui.toggleTheme()"><span class="material-symbols-rounded" id="mode-icon">dark_mode</span></button>
            <button class="btn btn-accent-color" onclick="app.exportImage()"><span class="material-symbols-rounded">download</span></button>
        </div>
    </header>

    <nav id="toolbar" class="glass">
        <button class="btn active" data-tool="pen" onclick="app.setTool('pen')"><span class="material-symbols-rounded">brush</span></button>
        <button class="btn" data-tool="fill" onclick="app.setTool('fill')"><span class="material-symbols-rounded">format_paint</span></button>
        <button class="btn" data-tool="eraser" onclick="app.setTool('eraser')"><span class="material-symbols-rounded">ink_eraser</span></button>
        <button class="btn" data-tool="move" onclick="app.setTool('move')"><span class="material-symbols-rounded">pan_tool</span></button>
    </nav>

    <aside id="layer-panel" class="glass">
        <div class="layer-header-row">
            <span class="layer-title-text">LAYERS</span>
            <button class="btn add-layer-action" onclick="layers.add()">
                <span class="material-symbols-rounded add-layer-icon-size">add</span>
            </button>
        </div>
        <div id="layer-list"></div>
    </aside>

    <main id="viewport">
        <div id="stage-container">
            <div id="interaction-layer"></div>
        </div>
    </main>

    <footer id="bottom-bar" class="glass">
        <div class="footer-controls">
            <div class="color-preview-box">
                <input type="color" id="color-pick" value="#000000" aria-label="Color picker" class="color-picker-input">
            </div>
            <div class="slider-wrapper">
                <input type="range" id="size-slider" min="1" max="300" value="20" aria-label="Brush size">
            </div>
            <span id="sz-num" class="size-display">20</span>
        </div>
    </footer>

    

        <script src="script.js"></script>

</body>

</html>
