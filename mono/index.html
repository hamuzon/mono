<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>コード置き場 - mono.hamusata.f5.si</title>

  <meta name="description" content="実験的なコードや Web API の検証を適当に公開している個人サイトです。">
  <meta name="author" content="hamusata">

  <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Potta One', cursive;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #ffffff;
      overflow: hidden;
    }

    .aurora {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 70% 20%, rgba(175,109,255,0.85), transparent 68%),
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(255,100,180,0.75), transparent 68%),
        radial-gradient(ellipse 60% 50% at 60% 65%, rgba(255,235,170,0.95), transparent 68%),
        linear-gradient(180deg, #f7eaff 0%, #fde2ea 100%);
      animation: auroraMove 20s ease-in-out infinite alternate;
    }

    @keyframes auroraMove {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    .container {
      max-width: 900px;
      width: 100%;
      text-align: center;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.45);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 1.25rem;
      opacity: 0.95;
      margin-bottom: 1.6rem;
    }

    .desc {
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2.2rem;
    }

    .desc-en {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-top: 0.6rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.4rem;
    }

    .card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 1.6rem;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 0.6rem;
    }

    .card-title {
      font-size: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .card-desc {
      font-size: 0.95rem;
      line-height: 1.55;
      opacity: 0.9;
    }

    footer {
      margin-top: 2.6rem;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 1.05rem; }
      .desc { font-size: 0.95rem; }
    }
  </style>
</head>

<body>
  <div class="aurora"></div>

  <div class="container">
    <h1 id="title-ja"></h1>
    <div class="subtitle" id="subtitle-ja"></div>

    <div class="desc">
      <div id="msg-ja"></div>
      <div class="desc-en" id="msg-en"></div>
    </div>

    <div class="cards" id="cards"></div>

    <footer>
      © <span id="year"></span> hamusata<br>
      Experimental / Some features may not work on all browsers
    </footer>
  </div>

  <script>
    fetch("/site.json")
      .then(res => res.json())
      .then(data => {
        document.getElementById("title-ja").textContent =
          data.siteStatus.title_ja + " / " + data.siteStatus.title_en;

        document.getElementById("subtitle-ja").textContent =
          data.siteStatus.subtitle_ja + " / " + data.siteStatus.subtitle_en;

        document.getElementById("msg-ja").textContent =
          data.siteStatus.message_ja;

        document.getElementById("msg-en").textContent =
          data.siteStatus.message_en;

        const cards = document.getElementById("cards");

        data.cards.forEach(card => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="card-icon">${card.icon}</div>
            <div class="card-title">${card.title}</div>
            <div class="card-desc">${card.description}</div>
          `;
          if (card.url) {
            div.onclick = () => location.href = card.url;
          }
          cards.appendChild(div);
        });
      });

    const baseYear = 2025;
    const y = new Date().getFullYear();
    document.getElementById("year").textContent =
      y > baseYear ? baseYear + "–" + y : baseYear;
  </script>
</body>
</html>
