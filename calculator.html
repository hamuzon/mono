<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>計算機 / Calculator</title>

    <script>
        (function() {
            const p = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","vibe":50,"unit":"deg"}');
            
            const upd = (isD) => {
                document.documentElement.className = isD ? 'dark' : 'light';
                document.documentElement.style.backgroundColor = isD ? '#1B1C17' : '#FDFCF4';
            };

            if (p.mode === 'system') {
                const q = window.matchMedia('(prefers-color-scheme: dark)');
                upd(q.matches);
                q.addEventListener('change', e => upd(e.matches));
            } else {
                upd(p.mode === 'dark');
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #FDFCF4; --on-bg: #1B1C17;
            --surf: #EFF1E0; --on-surf: #44483D;
            --pri: #4C662B; --on-pri: #FFFFFF;
            --pri-c: #D7E8B7; --on-pri-c: #121F00;
            --sec-c: #E3E4D3; --sci-bg: #D7E8B7;
        }

        .dark {
            --bg: #1B1C17; --on-bg: #E3E4D3;
            --surf: #2F3126; --on-surf: #C7C8B8;
            --pri: #B1D18A; --on-pri: #1F3701;
            --pri-c: #3E4A2B; --on-pri-c: #D7E8B7;
            --sec-c: #45483C; --sci-bg: #3E4A2B;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Google Sans', sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }

        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 32px;
            text-align: right;
        }

        #log-display {
            font-size: 1.5rem;
            color: var(--on-surf);
            opacity: 0.7;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 8px;
            min-height: 1.6rem;
        }

        #main-display {
            font-size: clamp(3.2rem, 16vw, 6.8rem);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .input-panel {
            background: var(--surf);
            border-radius: 40px 40px 0 0;
            padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
            transition: background 0.4s;
        }

        .utility-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 16px;
        }

        .utility-bar span {
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            color: var(--pri);
            font-size: 24px;
        }

        #mode-toggle {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--pri);
            padding: 6px 14px;
            border-radius: 14px;
            background: var(--pri-c);
            text-transform: uppercase;
        }

        .layout-engine {
            display: flex;
            gap: 12px;
        }
        
        .sci-cluster {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .sci-cluster.active {
            width: 44%;
            opacity: 1;
        }

        .num-cluster {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex: 1;
        }

        button {
            height: clamp(60px, 11vh, 84px);
            border: none;
            border-radius: 42px;
            font-size: 1.5rem;
            font-weight: 500;
            background: var(--bg);
            color: var(--on-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        button:active {
            transform: scale(0.9);
            filter: brightness(0.9);
        }

        .k-op { background: var(--pri-c); color: var(--on-pri-c); }
        .k-sci { background: var(--sci-bg); font-size: 1.05rem; border-radius: 22px; height: 52px; }
        .k-eq { background: var(--pri); color: var(--on-pri); font-size: 2.6rem; }

        @media (min-width: 850px) or (orientation: landscape) {
            .sci-cluster { width: 36% !important; opacity: 1 !important; display: grid !important; }
            #flask-btn { display: none; }
            .input-panel { border-radius: 0; }
        }

        .overlay-menu {
            position: absolute;
            right: 24px;
            bottom: 110px;
            background: var(--bg);
            border-radius: 28px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            z-index: 5000;
            overflow: hidden;
            min-width: 220px;
        }

        .overlay-menu div {
            padding: 20px 24px;
            border-bottom: 1px solid var(--surf);
            cursor: pointer;
        }

        .vibe-slider {
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="range"] {
            accent-color: var(--pri);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <section class="display-container">
        <div id="log-display"></div>
        <div id="main-display">0</div>
    </section>

    <nav class="input-panel">
        <div class="utility-bar">
            <div style="display:flex; align-items:center; gap:12px;">
                <span id="flask-btn" class="material-symbols-outlined" onclick="ui('sci')">flask</span>
                <div id="mode-toggle" onclick="ui('unit')">deg</div>
            </div>

            <div style="position:relative;">
                <span class="material-symbols-outlined" id="menu-btn" onclick="ui('menu')">more_vert</span>
                <div id="settings-menu" class="overlay-menu">
                    <div onclick="sys('light')">ライトモード</div>
                    <div onclick="sys('dark')">ダークモード</div>
                    <div onclick="sys('system')">システム同期</div>
                    <div onclick="sys('copy')">結果をコピー</div>
                    <div class="vibe-slider">
                        <span style="font-size:0.85rem">振動: <span id="v-val">50</span>%</span>
                        <input type="range" id="v-range" min="0" max="100" value="50" oninput="sys('vibe', this.value)">
                    </div>
                </div>
            </div>
        </div>

        <div class="layout-engine">
            <div id="sci-grid" class="sci-cluster">
                <button class="k-sci" onclick="run('sin(')">sin</button>
                <button class="k-sci" onclick="run('cos(')">cos</button>
                <button class="k-sci" onclick="run('tan(')">tan</button>
                <button class="k-sci" onclick="run('log(')">log</button>
                <button class="k-sci" onclick="run('ln(')">ln</button>
                <button class="k-sci" onclick="run('sqrt(')">√</button>
                <button class="k-sci" onclick="run('inv(')">1/x</button>
                <button class="k-sci" onclick="run('^')">xʸ</button>
                <button class="k-sci" onclick="run('abs(')">|x|</button>
                <button class="k-sci" onclick="run('π')">π</button>
                <button class="k-sci" onclick="run('e')">e</button>
                <button class="k-sci" onclick="run('!')">n!</button>
            </div>

            <div class="num-cluster">
                <button class="k-op" onclick="run('AC')">AC</button>
                <button class="k-op" onclick="run('DEL')">⌫</button>
                <button class="k-op" onclick="run('(')">(</button>
                <button class="k-op" onclick="run(')')">)</button>

                <button onclick="run('7')">7</button>
                <button onclick="run('8')">8</button>
                <button onclick="run('9')">9</button>
                <button class="k-op" onclick="run('÷')">÷</button>

                <button onclick="run('4')">4</button>
                <button onclick="run('5')">5</button>
                <button onclick="run('6')">6</button>
                <button class="k-op" onclick="run('×')">×</button>

                <button onclick="run('1')">1</button>
                <button onclick="run('2')">2</button>
                <button onclick="run('3')">3</button>
                <button class="k-op" onclick="run('-')">-</button>

                <button onclick="run('0')">0</button>
                <button onclick="run('.')">.</button>
                <button class="k-eq" onclick="run('=')">=</button>
                <button class="k-op" onclick="run('+')">+</button>
            </div>
        </div>
    </nav>

    <script>
        let exp = "";
        let solved = false;
        let p = JSON.parse(localStorage.getItem('calc-prefs') || '{"mode":"system","vibe":50,"unit":"deg"}');

        function vib() {
            if (navigator.vibrate && p.vibe > 0) {
                navigator.vibrate(p.vibe / 4);
            }
        }

        function ui(type) {
            vib();
            if (type === 'sci') {
                const g = document.getElementById('sci-grid');
                g.classList.toggle('active');
                document.getElementById('flask-btn').style.fontVariationSettings = g.classList.contains('active') ? "'FILL' 1" : "'FILL' 0";
            }
            if (type === 'unit') {
                p.unit = p.unit === 'deg' ? 'rad' : 'deg';
                document.getElementById('mode-toggle').innerText = p.unit;
                localStorage.setItem('calc-prefs', JSON.stringify(p));
            }
            if (type === 'menu') {
                const m = document.getElementById('settings-menu');
                m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            }
        }

        function sys(cmd, val) {
            vib();
            if (cmd === 'vibe') {
                p.vibe = val;
                document.getElementById('v-val').innerText = val;
                localStorage.setItem('calc-prefs', JSON.stringify(p));
            }
            if (['light', 'dark', 'system'].includes(cmd)) {
                p.mode = cmd;
                localStorage.setItem('calc-prefs', JSON.stringify(p));
                location.reload();
            }
            if (cmd === 'copy') {
                navigator.clipboard.writeText(exp || "0");
                ui('menu');
            }
        }

        function run(key) {
            vib();
            const m = document.getElementById('main-display');
            const l = document.getElementById('log-display');

            if (key === 'AC') {
                exp = ""; l.innerText = ""; solved = false;
            } else if (key === 'DEL') {
                exp = exp.slice(0, -1);
            } else if (key === '=') {
                try {
                    let f = exp.replace(/÷/g, '/').replace(/×/g, '*')
                               .replace(/sin\(/g, p.unit === 'deg' ? 'Math.sin(Math.PI/180*' : 'Math.sin(')
                               .replace(/cos\(/g, p.unit === 'deg' ? 'Math.cos(Math.PI/180*' : 'Math.cos(')
                               .replace(/tan\(/g, p.unit === 'deg' ? 'Math.tan(Math.PI/180*' : 'Math.tan(')
                               .replace(/log\(/g, 'Math.log10(').replace(/ln\(/g, 'Math.log(')
                               .replace(/sqrt\(/g, 'Math.sqrt(').replace(/inv\(/g, '1/(')
                               .replace(/abs\(/g, 'Math.abs(').replace(/π/g, 'Math.PI')
                               .replace(/e/g, 'Math.E').replace(/\^/g, '**');

                    const o = (f.match(/\(/g) || []).length;
                    const c = (f.match(/\)/g) || []).length;
                    if (o > c) f += ')'.repeat(o - c);

                    let res = eval(f);
                    l.innerText = exp + " =";
                    exp = Number.isInteger(res) ? res.toString() : parseFloat(res.toFixed(10)).toString();
                    solved = true;
                } catch {
                    m.innerText = "Error";
                    setTimeout(() => m.innerText = exp || "0", 800);
                    return;
                }
            } else {
                if (solved && /[0-9]/.test(key)) exp = "";
                solved = false; exp += key;
            }

            m.innerText = exp || "0";
            m.scrollLeft = m.scrollWidth;
            document.getElementById('settings-menu').style.display = 'none';
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('#menu-btn') && !e.target.closest('#settings-menu')) {
                document.getElementById('settings-menu').style.display = 'none';
            }
        });

        window.onload = () => {
            document.getElementById('v-range').value = p.vibe;
            document.getElementById('v-val').innerText = p.vibe;
            document.getElementById('mode-toggle').innerText = p.unit;
        };
    </script>
</body>
</html>
