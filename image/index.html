<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gradient & Solid Color Image Generator</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eef1f5;
    color: #222;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 16px;
}

h1 {
    text-align: center;
    margin-bottom: 24px;
}

fieldset {
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #ccc;
    padding: 16px;
    margin-bottom: 20px;
}

legend {
    font-weight: bold;
    padding: 0 10px;
}

label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    font-size: 14px;
}

input, select, button {
    padding: 10px;
    font-size: 15px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

button {
    background: #3b82f6;
    color: #fff;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.button-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.color-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.color-item {
    background: #f7f9fd;
    padding: 12px;
    border-radius: 14px;
}

.color-item input[type=color] {
    width: 100%;
    height: 56px;
    border-radius: 12px;
    border: 2px solid #555;
}

.move {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

canvas {
    display: block;
    max-width: 100%;
    margin: 24px auto;
    border-radius: 16px;
    border: 1px solid #ccc;
    background: #fff;
}

#filenamePreview {
    background: #edf1f7;
    padding: 12px;
    border-radius: 10px;
    font-family: monospace;
    word-break: break-all;
}

@media (max-width: 600px) {
    .button-group {
        flex-direction: column;
    }
}
</style>
</head>

<body>
<div class="container">

<h1>グラデーション & 単色画像ジェネレーター</h1>

<fieldset>
<legend>色</legend>

<div class="color-list" id="colorList"></div>

<div class="button-group">
    <button id="addColor">色追加</button>
    <button id="removeColor">色削除</button>
</div>

<label>角度
<input type="number" id="angle" min="0" max="360">
</label>

<div class="toggle">
    <input type="checkbox" id="singleColor">
    <span>単色モード</span>
</div>

<div class="toggle">
    <input type="checkbox" id="randomMode">
    <span>ランダム（プレビュー時のみ）</span>
</div>
</fieldset>

<fieldset>
<legend>サイズ</legend>

<label>プリセット
<select id="preset">
    <option value="">自由</option>
    <option value="1280x720">HD 横</option>
    <option value="720x1280">HD 縦</option>
    <option value="1920x1080">フルHD 横</option>
    <option value="1080x1920">フルHD 縦</option>
    <option value="2560x1440">2K 横</option>
    <option value="1440x2560">2K 縦</option>
    <option value="3840x2160">4K 横</option>
    <option value="2160x3840">4K 縦</option>
</select>
</label>

<label>幅(px)<input type="number" id="width"></label>
<label>高さ(px)<input type="number" id="height"></label>
</fieldset>

<fieldset>
<legend>画像形式</legend>

<label>拡張子
<select id="ext">
    <option value="png">PNG</option>
    <option value="jpeg">JPEG</option>
    <option value="webp">WebP</option>
</select>
</label>

<label>画質
<input type="number" id="quality" min="0.1" max="1" step="0.01">
</label>
</fieldset>

<fieldset>
<legend>ファイル名</legend>

<label>名前
<input type="text" id="nameInput">
</label>

<div class="toggle"><input type="checkbox" id="tY" checked><span>年</span></div>
<div class="toggle"><input type="checkbox" id="tM" checked><span>月</span></div>
<div class="toggle"><input type="checkbox" id="tD" checked><span>日</span></div>
<div class="toggle"><input type="checkbox" id="tH" checked><span>時</span></div>
<div class="toggle"><input type="checkbox" id="tm" checked><span>分</span></div>
<div class="toggle"><input type="checkbox" id="ts" checked><span>秒</span></div>

<div class="toggle"><input type="checkbox" id="tW" checked><span>曜日</span></div>

<label>曜日言語
<select id="weekdayLang">
    <option value="en">英語</option>
    <option value="jp">日本語</option>
</select>
</label>

<div class="toggle"><input type="checkbox" id="tID" checked><span>ランダムID</span></div>

<div id="filenamePreview"></div>
</fieldset>

<fieldset>
<legend>保存 / 復元</legend>

<div class="toggle">
    <input type="checkbox" id="jsonExport" checked>
    <span>画像保存時 JSON も出力</span>
</div>

<div class="button-group">
    <button id="exportJson">JSON 書き出し</button>
    <button id="importJson">JSON 読み込み</button>
    <button id="saveTemplate">テンプレート保存</button>
    <button id="resetAll">初期値に戻す</button>
</div>

<input type="file" id="jsonFile" accept=".json" hidden>
</fieldset>

<div class="button-group">
    <button id="previewBtn">プレビュー</button>
    <button id="saveBtn">保存</button>
</div>

<canvas id="canvas"></canvas>

<script>
const STORAGE_KEY = "gradient_image_generator";

const DEFAULT_STATE = {
    colors: ["#ff0000", "#0000ff"],
    angle: 135,
    singleColor: false,
    randomMode: false,
    width: 1920,
    height: 1080,
    ext: "png",
    quality: 0.92,
    name: "Image",
    tY: true,
    tM: true,
    tD: true,
    tH: true,
    tm: true,
    ts: true,
    tW: true,
    tID: true,
    weekdayLang: "en",
    jsonExport: true
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorList = document.getElementById("colorList");

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getState()));
}

function loadState() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_STATE;
}

function getState() {
    return {
        colors: [...colorList.querySelectorAll("input[type=color]")].map(i=>i.value),
        angle: angle.value,
        singleColor: singleColor.checked,
        randomMode: randomMode.checked,
        width: width.value,
        height: height.value,
        ext: ext.value,
        quality: quality.value,
        name: nameInput.value,
        tY: tY.checked,
        tM: tM.checked,
        tD: tD.checked,
        tH: tH.checked,
        tm: tm.checked,
        ts: ts.checked,
        tW: tW.checked,
        tID: tID.checked,
        weekdayLang: weekdayLang.value,
        jsonExport: jsonExport.checked
    };
}

function applyState(s) {
    colorList.innerHTML = "";
    s.colors.forEach(c=>addColor(c));
    angle.value = s.angle;
    singleColor.checked = s.singleColor;
    randomMode.checked = s.randomMode;
    width.value = s.width;
    height.value = s.height;
    ext.value = s.ext;
    quality.value = s.quality;
    nameInput.value = s.name;
    tY.checked = s.tY;
    tM.checked = s.tM;
    tD.checked = s.tD;
    tH.checked = s.tH;
    tm.checked = s.tm;
    ts.checked = s.ts;
    tW.checked = s.tW;
    tID.checked = s.tID;
    weekdayLang.value = s.weekdayLang;
    jsonExport.checked = s.jsonExport;
}

function addColor(val="#ffffff") {
    const d = document.createElement("div");
    d.className = "color-item";
    d.innerHTML = `
        <input type="color" value="${val}">
        <div class="move">
            <button class="up">▲</button>
            <button class="down">▼</button>
        </div>`;
    colorList.appendChild(d);
}

colorList.onclick = e => {
    const item = e.target.closest(".color-item");
    if (!item) return;
    if (e.target.classList.contains("up") && item.previousElementSibling)
        colorList.insertBefore(item, item.previousElementSibling);
    if (e.target.classList.contains("down") && item.nextElementSibling)
        colorList.insertBefore(item.nextElementSibling, item);
};

function draw() {
    canvas.width = width.value;
    canvas.height = height.value;

    const cols = [...colorList.querySelectorAll("input")].map(i=>i.value);

    if (singleColor.checked || cols.length === 1) {
        ctx.fillStyle = cols[0];
        ctx.fillRect(0,0,canvas.width,canvas.height);
        return;
    }

    const r = angle.value * Math.PI / 180;
    const g = ctx.createLinearGradient(
        canvas.width/2 - Math.cos(r)*canvas.width/2,
        canvas.height/2 - Math.sin(r)*canvas.height/2,
        canvas.width/2 + Math.cos(r)*canvas.width/2,
        canvas.height/2 + Math.sin(r)*canvas.height/2
    );

    cols.forEach((c,i)=>g.addColorStop(i/(cols.length-1),c));
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function filename(preview) {
    const d = new Date();
    const p = n=>String(n).padStart(2,"0");
    const a = [];

    if (nameInput.value) a.push(nameInput.value);
    if (tY.checked) a.push(d.getFullYear());
    if (tM.checked) a.push(p(d.getMonth()+1));
    if (tD.checked) a.push(p(d.getDate()));

    const t = [];
    if (tH.checked) t.push(p(d.getHours()));
    if (tm.checked) t.push(p(d.getMinutes()));
    if (ts.checked) t.push(p(d.getSeconds()));
    if (t.length) a.push(t.join("-"));

    if (tW.checked) {
        const jp=["日","月","火","水","木","金","土"];
        const en=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        a.push(weekdayLang.value==="jp"?jp[d.getDay()]:en[d.getDay()]);
    }

    if (tID.checked) a.push(Math.random().toString(36).slice(2,6));

    const name = a.join("_").replace(/[_-]+$/g,"");
    if (preview) filenamePreview.textContent = name + "." + ext.value;
    return name;
}

previewBtn.onclick = () => {
    if (randomMode.checked) {
        colorList.innerHTML = "";
        for (let i=0;i<3;i++)
            addColor("#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0"));
    }
    draw();
    filename(true);
    saveState();
};

saveBtn.onclick = () => {
    draw();
    const base = filename(false);
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/"+ext.value, Number(quality.value));
    a.download = base + "." + ext.value;
    a.click();

    if (jsonExport.checked) {
        const blob = new Blob([JSON.stringify(getState(),null,2)],{type:"application/json"});
        const j = document.createElement("a");
        j.href = URL.createObjectURL(blob);
        j.download = base + ".json";
        j.click();
    }
};

exportJson.onclick = () => {
    const blob = new Blob([JSON.stringify(getState(),null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "settings.json";
    a.click();
};

importJson.onclick = () => jsonFile.click();

jsonFile.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ()=> {
        applyState(JSON.parse(r.result));
        saveState();
        filename(true);
    };
    r.readAsText(f);
};

saveTemplate.onclick = () => saveState();

resetAll.onclick = () => {
    localStorage.removeItem(STORAGE_KEY);
    applyState(DEFAULT_STATE);
    filename(true);
};

preset.onchange = () => {
    if (!preset.value) return;
    const [w,h] = preset.value.split("x");
    width.value = w;
    height.value = h;
};

addColor.onclick = () => {
    if (colorList.children.length < 10) addColor();
};

removeColor.onclick = () => {
    if (colorList.children.length > 2)
        colorList.lastElementChild.remove();
};

applyState(loadState());
filename(true);
</script>

</div>
</body>
</html>
